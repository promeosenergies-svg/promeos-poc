# ── VNU (post-ARENH) — effectif 2026 ────────────────────────────────────────

vnu:
  source: "LF 2025 art. 17, decrets 2025-909/910, CRE 2025-268"
  values:
    - component: VNU_SEUIL_BAS
      value: 78.0
      unit: EUR_MWH
      notes: "Seuil declenchement prelevement EDF"
    - component: VNU_SEUIL_HAUT
      value: 110.0
      unit: EUR_MWH
      notes: "Seuil prelevement majore"
    - component: VNU_TAUX_PRELEVEMENT
      value: 50.0
      unit: PCT
      notes: "50% des revenus excedentaires entre seuil bas et haut"
  valid_from: "2026-01-01"
  valid_to: null
  cost_complet_nucleaire: 60.3
  cost_complet_unit: EUR_MWH
  cost_revision_next: "2029"
  notes: |
    VNU ne se declenche que si revenus nucleaires EDF > seuil bas.
    Estimation CRE 2026: revenus ~66 EUR/MWh -> VNU probablement non active.
    Redistribution ex-post via guichet fournisseurs.

