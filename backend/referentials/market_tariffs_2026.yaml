# ══════════════════════════════════════════════════════════════════════════════
# PROMEOS — Referentiel tarifs reglementes France (multi-versions)
# Chaque section porte un suffixe de version (_v6, _v7, _2024, _2025, _2026…).
# Le loader insere chaque version dans regulated_tariffs avec valid_from/valid_to.
# get_current_tariff(at_date) retourne le tarif en vigueur a la date demandee.
# ══════════════════════════════════════════════════════════════════════════════

version: "2026-03"
last_updated: "2026-03-27"
next_review: "2026-08-01"

# ── TURPE 6 — CRE Deliberation n.2021-13 ────────────────────────────────────
# Applicable du 1er aout 2021 au 31 juillet 2025.
# Valeurs HTA CU pointe fixe (composante soutirage variable).
# Source: tarifs_reglementaires.yaml (CRE brut)
turpe_v6:
  source: "CRE Deliberation n.2021-13 — TURPE 6 HTA-BT"
  source_url: "https://www.cre.fr/electricite/tarifs-dacheminement"
  notes: |
    TURPE 6 HTA CU pointe fixe — composante soutirage variable.
    Valeurs au 1er aout 2021 (derniere grille TURPE 6).
  rates:
    - component: TURPE_SOUTIRAGE_HPH
      value: 32.00
      unit: EUR_MWH
      applies_to_voltage: "HTA"
      applies_to_profile: "CU_POINTE_FIXE"
      notes: "3.20 cEUR/kWh — HPH TURPE 6 C3 HTA CU pf"
    - component: TURPE_SOUTIRAGE_HCH
      value: 21.70
      unit: EUR_MWH
      applies_to_voltage: "HTA"
      applies_to_profile: "CU_POINTE_FIXE"
      notes: "2.17 cEUR/kWh — HCH TURPE 6 C3 HTA CU pf"
    - component: TURPE_SOUTIRAGE_HPB
      value: 16.40
      unit: EUR_MWH
      applies_to_voltage: "HTA"
      applies_to_profile: "CU_POINTE_FIXE"
      notes: "1.64 cEUR/kWh — HPB TURPE 6 C3 HTA CU pf"
    - component: TURPE_SOUTIRAGE_HCB
      value: 10.10
      unit: EUR_MWH
      applies_to_voltage: "HTA"
      applies_to_profile: "CU_POINTE_FIXE"
      notes: "1.01 cEUR/kWh — HCB TURPE 6 C3 HTA CU pf"
    - component: TURPE_PART_FIXE
      value: 9.84
      unit: EUR_KW_AN
      applies_to_voltage: "HTA"
      applies_to_profile: "CU_POINTE_FIXE"
      notes: "Part fixe annuelle CU poste HTA TURPE 6"
    - component: TURPE_COMPTAGE
      value: 312.12
      unit: EUR_AN
      applies_to_voltage: "HTA"
      notes: "Composante comptage annuelle HTA TURPE 6"
  valid_from: "2021-08-01"
  valid_to: "2025-07-31"

# ── TURPE 7 — CRE Deliberation n.2025-78 ────────────────────────────────────
# Applicable depuis le 1er aout 2025.
# Valeurs HTA CU pointe fixe (composante soutirage variable).
turpe:
  source: "CRE Deliberation n.2025-78 du 13 mars 2025 — TURPE 7 HTA-BT"
  source_url: "https://www.enedis.fr/media/4717/download"
  notes: |
    Valeurs TURPE 7 HTA CU pointe fixe (composante soutirage variable uniquement).
    FTA par defaut pour tertiaire bureau ETI. Pour LU, utiliser les grilles CRE.
    La composante Pointe est ajoutee (dec-fev, hors dim).
    Part fixe (b) = EUR/kW/an par plage, valeur HPH utilisee.
  rates:
    - component: TURPE_SOUTIRAGE_POINTE
      value: 57.40
      unit: EUR_MWH
      applies_to_voltage: "HTA"
      applies_to_profile: "CU_POINTE_FIXE"
      notes: "5.74 cEUR/kWh x10 = 57.40 EUR/MWh — Pointe (dec-fev, 2h matin + 2h soir, hors dim)"
    - component: TURPE_SOUTIRAGE_HPH
      value: 42.30
      unit: EUR_MWH
      applies_to_voltage: "HTA"
      applies_to_profile: "CU_POINTE_FIXE"
      notes: "4.23 cEUR/kWh x10 = 42.30 EUR/MWh — Heures Pleines Hiver"
    - component: TURPE_SOUTIRAGE_HCH
      value: 19.90
      unit: EUR_MWH
      applies_to_voltage: "HTA"
      applies_to_profile: "CU_POINTE_FIXE"
      notes: "1.99 cEUR/kWh x10 = 19.90 EUR/MWh — Heures Creuses Hiver"
    - component: TURPE_SOUTIRAGE_HPB
      value: 10.10
      unit: EUR_MWH
      applies_to_voltage: "HTA"
      applies_to_profile: "CU_POINTE_FIXE"
      notes: "1.01 cEUR/kWh x10 = 10.10 EUR/MWh — Heures Pleines Ete"
    - component: TURPE_SOUTIRAGE_HCB
      value: 6.90
      unit: EUR_MWH
      applies_to_voltage: "HTA"
      applies_to_profile: "CU_POINTE_FIXE"
      notes: "0.69 cEUR/kWh x10 = 6.90 EUR/MWh — Heures Creuses Ete"
    - component: TURPE_PART_FIXE
      value: 14.41
      unit: EUR_KW_AN
      applies_to_voltage: "HTA"
      applies_to_profile: "CU_POINTE_FIXE"
      notes: "Part fixe HPH/HCH/Pointe = 14.41 EUR/kW/an, HPB = 12.55, HCB = 11.22"
    - component: TURPE_COMPTAGE
      value: 376.39
      unit: EUR_AN
      applies_to_voltage: "HTA"
      notes: "Comptage mensuel HTA — TURPE 7 Enedis plaquette"
  valid_from: "2025-08-01"
  valid_to: null

