[tool.ruff]
target-version = "py311"
line-length = 120
exclude = ["venv", "alembic", "__pycache__"]

[tool.ruff.lint]
select = ["E", "F", "W", "B"]
ignore = [
  "B008",   # function-call-in-default-argument — FastAPI Depends() pattern
  "E501",   # line-too-long — handled by formatter
  "E401",   # multiple-imports-on-one-line — existing code pattern
  "E402",   # module-import-not-at-top — some files use late imports
  "E701",   # multiple-statements-on-one-line-colon
  "E702",   # multiple-statements-on-one-line-semicolon
  "E712",   # true-false-comparison — SQLAlchemy filter pattern
  "E741",   # ambiguous-variable-name
  "F401",   # unused-import — too many to fix safely in one pass
  "F541",   # f-string-missing-placeholders — cosmetic
  "F841",   # unused-variable — warnings, not errors
  "B007",   # unused-loop-control-variable
  "B017",   # assert-raises-exception
  "B904",   # raise-without-from-inside-except
  "B905",   # zip-without-explicit-strict
  "W293",   # blank-line-with-whitespace — handled by formatter
]

[tool.ruff.lint.isort]
known-first-party = ["routes", "models", "services", "utils"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
allow_untyped_defs = true
ignore_missing_imports = true
disable_error_code = [
  "import-untyped",
  "assignment",
  "arg-type",
  "return-value",
  "var-annotated",
  "attr-defined",
  "operator",
  "index",
  "call-overload",
  "misc",
  "override",
  "union-attr",
  "name-defined",
  "type-arg",
  "no-untyped-def",
  "call-arg",
  "valid-type",
  "has-type",
  "dict-item",
  "list-item",
]
explicit_package_bases = true
exclude = ["venv/", "alembic/", "app/", "scripts/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-x -q --tb=short"
