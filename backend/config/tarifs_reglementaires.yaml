# ── Prix repère gaz CRE (référence pour offres indexées B2C/B2B) ───────────
# Indicateur mensuel CRE pour le marché particuliers mais utilisé en
# référence d'indexation par certains fournisseurs B2B (offres variables).
# Non directement consommé par le shadow billing (qui reconstitue la
# décomposition ATRD+ATRT+fourniture), mais versionné ici pour le module
# d'analyse de contrat et l'audit des offres indexées.
# Source : CRE — prix repère de vente de gaz naturel, publié mensuellement.
