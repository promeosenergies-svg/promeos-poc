# ── CTA (Contribution Tarifaire d'Acheminement) ─────────────────────────────
# Historique : taux appliqué entre 1/08/2021 et 31/01/2026 (arrêté 26/07/2021).
# Le 1/02/2026, la CRE (délibération 2026-14) abaisse les taux élec à 15%
# (distribution) et 5% (transport ≥50kV). Les entrées cta_2021 et cta
# sont lues parallèlement par ParameterStore._yaml_candidates : le candidat
# dont la période contient la date d'effet gagne.
cta_2021:
  elec:
    taux_pct: 21.93
    assiette: "turpe_fixe_ht"
    source: "Arrêté CTA 26/07/2021 — distribution élec 21,93% (1/08/2021 → 31/01/2026)"
    valid_from: "2021-08-01"
    valid_to: "2026-01-31"
  elec_transport:
    taux_pct: 10.11
    assiette: "turpe_fixe_ht"
    source: "Arrêté CTA 26/07/2021 — transport élec ≥50kV 10,11% (1/08/2021 → 31/01/2026)"
    valid_from: "2021-08-01"
    valid_to: "2026-01-31"

cta:
  elec:
    taux_pct: 15.0
    assiette: "turpe_fixe_ht"
    source: "Arrêté CTA 27/01/2026 (CRE 2026-14, JORF) — distribution élec 15% (fév 2026+)"
    valid_from: "2026-02-01"
    valid_to: null
  elec_transport:
    taux_pct: 5.0
    assiette: "turpe_fixe_ht"
    source: "Arrêté CTA 27/01/2026 (CRE 2026-14, JORF) — transport élec ≥50kV 5% (fév 2026+)"
    valid_from: "2026-02-01"
    valid_to: null
  # CTA gaz raccordement distribution :
  # Formule exacte (Arrêté 20/07/2021 + Arrêté annuel coef transport) :
  #   CTA_gaz = 20.80% × abonnement_ATRD_annuel
  #           + 4.71% × coef_transport × abonnement_ATRD_annuel
  # Le taux distribution (20.80%) et le taux transport (4.71%) sont fixés
  # par l'Arrêté du 20/07/2021 (JORFTEXT000043847483) et sont stables.
  # Le coef_transport est révisé chaque 1er juillet par arrêté annuel :
  #   - 83.57% du 1/07/2024 au 30/06/2025 (arrêté 27/05/2024, CRE 2024-82)
  #   - 83.21% à partir du 1/07/2025 (arrêté 16/06/2025, JORFTEXT000051760148)
  # Taux effectif = 20.80% + 4.71% × coef (~24.73% au 1/07/2025).
  # Note : seul le terme `taux_pct` 20.80% distribution est consommé ici pour
  # rétro-compat ; le reste passe par CTA_GAZ_TRANS_RATE et
  # CTA_GAZ_TRANSPORT_COEF (résolus via ParameterStore).
  gaz:
    taux_pct: 20.80
    assiette: "atrd_abo_annuel_eur"
    source: "Arrêté 20/07/2021 (JORFTEXT000043847483) — quote-part distribution gaz 20.80%"
    valid_from: "2021-08-01"
    valid_to: null
  gaz_transport:
    taux_pct: 4.71
    assiette: "atrd_abo_annuel_eur"
    source: "Arrêté 20/07/2021 (JORFTEXT000043847483) — quote-part transport gaz 4.71%"
    valid_from: "2021-08-01"
    valid_to: null
  # Coefficient de proportionnalité transport imputé aux clients distribution.
  # Révisé chaque 1er juillet par arrêté conjoint énergie/budget après avis CRE.
  gaz_transport_coef:
    valeur_pct: 83.57
    source: "Arrêté 27/05/2024, avis CRE 2024-82 — coef CTA transport 83.57% (1/07/2024+)"
    valid_from: "2024-07-01"
    valid_to: "2025-06-30"
  gaz_transport_coef_2025:
    valeur_pct: 83.21
    source: "Arrêté 16/06/2025 (JORFTEXT000051760148) — coef CTA transport 83.21% (1/07/2025+)"
    valid_from: "2025-07-01"
    valid_to: null

