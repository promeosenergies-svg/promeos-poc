# ── CBAM — Carbon Border Adjustment Mechanism (frontières UE) ──────────────
# Premier prix officiel fixé par la Commission européenne le 7 avril 2026.
# Applicable aux imports d'acier, ciment, aluminium, engrais, hydrogène,
# électricité. Non encore consommé par une brique shadow billing (candidat
# pour une future brique "compute_cbam" clients importateurs industriels).
# Source : Commission européenne via Homaio, recalculé à partir de la
# moyenne des enchères EU ETS.
cbam_eu:
  rate_eur_per_t_co2: 75.36
  source: "Commission européenne — premier prix CBAM 07/04/2026"
  source_url: "homaio.com/post/cbam-europe-sets-its-first-carbon-border-price-at-eu75-36-tco2"
  valid_from: "2026-04-07"
  valid_to: null
  reference_ets_eur_per_t: 69.99    # EU ETS même jour, pour comparaison
  scope: ["acier", "ciment", "aluminium", "engrais", "hydrogene", "electricite"]
  # Intensités carbone par défaut (tCO2 embarqué par tonne de produit importé
  # hors UE). Valeurs issues des défauts Commission UE "Implementing Regulation
  # 2023/1773" tableau 2 (annexe) — utilisés quand l'importateur ne fournit
  # pas de donnée site-specific vérifiée.
  default_intensity_tco2_per_t:
    acier: 2.0         # aciéries haut fourneau/EAF mix, ordre CE par défaut
    ciment: 0.66       # clinker-riche, default EU 0.6-0.72
    aluminium: 16.5    # primaire (Hall-Héroult), très carbo-intensif hors EU
    engrais: 2.6       # ammonia-based, default UREA/NPK
    hydrogene: 10.0    # grey H₂ SMR sans CCS
    electricite: 0.45  # default EU hors interconnexions bas-carbone

# ── TVA ──────────────────────────────────────────────────────────────────────
tva:
  normale:
    taux: 0.20
    source: "CGI art. 278"
  reduite:
    taux: 0.055
    source: "CGI art. 278-0 bis"
    applicable_a: ["abonnement", "cta", "turpe_fixe"]
    # ATTENTION : Depuis le 1er août 2025 (LFI 2025, art. 20, directive UE),
    # le taux réduit 5,5% est supprimé sur abonnement, CTA et TURPE fixe.
    # TVA 20% uniforme sur toutes les composantes facture.
    # Source : bofip ACTU-2025-00057, service-public.fr, energie-info.fr
    supprime_au: "2025-08-01"

# ── VNU (Versement Nucléaire Universel) — post-ARENH ───────────────────────
# L'ARENH (42 €/MWh, 100 TWh/an) a pris fin le 31/12/2025.
# Le VNU est une taxe redistributive sur EDF, activée uniquement si
# le prix de marché dépasse les seuils fixés par la CRE.
# Source : Loi de souveraineté énergétique, art. L. 336-1 Code énergie
vnu:
  seuil_1_eur_mwh: 78.0
  seuil_2_eur_mwh: 110.0
  statut: "EN VIGUEUR — DORMANT (prix marché ~60 €/MWh < seuil 78)"
  source: "Loi de souveraineté énergétique — VNU au 01/01/2026 (Décret 2026-55, CRE 2026-52)"
  valid_from: "2026-01-01"
  revision_triennale: "~2028 (CRE)"
  note: "L'ancien ARENH (42 EUR/MWh) n'est plus applicable. Ne plus utiliser comme référence de prix."

# ── Prix de référence par défaut (fallback shadow billing) ──────────────────
prix_reference:
  elec_eur_kwh: 0.068
  gaz_eur_kwh: 0.045
  source: "PROMEOS POC fallback (EPEX Spot 30j moyen)"

# ── Cost Simulator post-ARENH MVP — constantes versionnées ─────────────────
# Utilisées par `services/purchase/cost_simulator_2026.py`. Migration depuis
# constantes hardcodées vers YAML pour traçabilité + versioning par date
# d'effet (cohérent avec le reste du référentiel CRE).
cost_simulator_2026:
  baseline_eur_mwh: 80.0  # ARENH 42 × 50% + complément spot 2024 (~120 × 50%)
  fallback_forward_eur_mwh: 68.0  # Si mkt_prices vide (= prix_reference.elec_eur_kwh × 1000)
  peak_premium_ratio: 0.15  # Majoration HP/HC baseload, calibrée Observatoire CRE T4 2025
  vnu_impact_upside_mvp_eur_mwh: 2.0  # Estimation MVP impact VNU si actif (hors section réglementaire vnu)
  source: "PROMEOS MVP post-ARENH — calibration Observatoire CRE T4 2025 + baromètre CRE bulletin marchés de gros 2025"
  valid_from: "2026-01-01"
  valid_to: null

# ── Pilotage Flex Ready® — paramètres MVP ROI + scoring portefeuille ───────
# Constantes indicatives (pas des engagements commerciaux) utilisées par :
#   - `services/pilotage/roi_flex_ready.py` : business case chiffré par site
#   - `services/pilotage/portefeuille_scoring.py` : classement multi-sites
#
# Résolution :
#   - Clé `code` + (optionnel) `scope.archetype` : sans archetype → wildcard "*"
#   - Sélection par valid_from (le plus récent ≤ at_date)
#   - Chaque entrée porte unité + source documentée (traçabilité RegOps/CFO)
#
# Sources primaires :
#   - Baromètre Flex 2026 (RTE / Enedis / GIMELEC, avril 2026)
#   - Observatoire CRE T4 2025 (513 h prix négatifs France 2025)
#   - Fiche CEE BAT-TH-116 "Système GTB / BACS"
#   - Bulletin marchés de gros CRE T4 2025
