  rate_eur_mwh: 160.54
  source: "CRE prix repère gaz particuliers au 01/05/2026 (+15,4% vs avril)"
  source_url: "service-public.gouv.fr/particuliers/actualites/A17956"
  valid_from: "2026-05-01"
  valid_to: null
  previous_rate_eur_mwh: 139.12     # pour calcul delta
  previous_valid_from: "2026-04-01"

# ── CBAM — Carbon Border Adjustment Mechanism (frontières UE) ──────────────
# Premier prix officiel fixé par la Commission européenne le 7 avril 2026.
# Applicable aux imports d'acier, ciment, aluminium, engrais, hydrogène,
# électricité. Non encore consommé par une brique shadow billing (candidat
# pour une future brique "compute_cbam" clients importateurs industriels).
# Source : Commission européenne via Homaio, recalculé à partir de la
# moyenne des enchères EU ETS.
cbam_eu:
  rate_eur_per_t_co2: 75.36
  source: "Commission européenne — premier prix CBAM 07/04/2026"
  source_url: "homaio.com/post/cbam-europe-sets-its-first-carbon-border-price-at-eu75-36-tco2"
  valid_from: "2026-04-07"
  valid_to: null
  reference_ets_eur_per_t: 69.99    # EU ETS même jour, pour comparaison
  scope: ["acier", "ciment", "aluminium", "engrais", "hydrogene", "electricite"]

# ── TVA ──────────────────────────────────────────────────────────────────────
tva:
  # Top-level valid_from = 1/08/2025 : doctrine PROMEOS "TVA 20% uniforme"
  # devient effective ce jour-là (suppression du taux réduit 5,5% sur
  # abonnement + CTA + TURPE fixe). Avant cette date, les 2 taux co-existaient
  # et la sélection était faite par composante. Fix P0 audit Regulatory 2026-04-15.
  valid_from: "2025-08-01"
  valid_to: null
  source: "LFI 2025 art. 20 + directive UE (bofip ACTU-2025-00057) — TVA 20% uniforme au 1/08/2025"
  normale:
    taux: 0.20
    source: "CGI art. 278"
  reduite:
    taux: 0.055
    source: "CGI art. 278-0 bis"
    applicable_a: ["abonnement", "cta", "turpe_fixe"]
    # ATTENTION : Depuis le 1er août 2025 (LFI 2025, art. 20, directive UE),
    # le taux réduit 5,5% est supprimé sur abonnement, CTA et TURPE fixe.
    # TVA 20% uniforme sur toutes les composantes facture.
    # Source : bofip ACTU-2025-00057, service-public.fr, energie-info.fr
    supprime_au: "2025-08-01"

# ── VNU (Versement Nucléaire Universel) — post-ARENH ───────────────────────
# L'ARENH (42 €/MWh, 100 TWh/an) a pris fin le 31/12/2025.
# Le VNU est une taxe redistributive sur EDF, activée uniquement si
# le prix de marché dépasse les seuils fixés par la CRE.
# Source : Loi de souveraineté énergétique, art. L. 336-1 Code énergie
vnu:
  dormant: true
  taux_eur_mwh: 0.0  # explicite : aucun prélèvement tant que marché < seuil_1
  seuil_1_eur_mwh: 78.0
  seuil_2_eur_mwh: 110.0
  statut: "EN VIGUEUR — DORMANT (prix marché ~60 €/MWh < seuil 78)"
  source: "Loi de souveraineté énergétique (art. L. 336-1 Code énergie), CRE 2026-52 / Décret 2026-55"
  valid_from: "2026-01-01"
  valid_to: null
  revision_triennale: "~2028 (CRE)"
  note: "L'ancien ARENH (42 EUR/MWh) n'est plus applicable. Ne plus utiliser comme référence de prix. Le flag `dormant: true` signale aux moteurs de calcul de ne PAS appliquer de composante VNU tant qu'une activation explicite n'est pas publiée."

# ── Prix de référence par défaut (fallback shadow billing) ──────────────────
# Note : `prix_reference` est un FALLBACK non-réglementaire (prix spot moyen
# interne PROMEOS), pas une grille tarifaire officielle. Il n'a donc pas de
# `valid_from` réglementaire strict. Le champ `valid_from` ci-dessous est
# purement une date d'initialisation de la valeur (traceability PROMEOS),
# pas une date d'effet légale. Audit Regulatory 2026-04-15 (P2).
prix_reference:
  elec_eur_kwh: 0.068
  gaz_eur_kwh: 0.045
  source: "PROMEOS POC fallback (EPEX Spot 30j moyen, 2024-2025)"
  valid_from: "2024-01-01"
  valid_to: null
  is_regulatory: false
