# ── TVA ──────────────────────────────────────────────────────────────────────
tva:
  normale:
    taux: 0.20
    source: "CGI art. 278"
  reduite:
    taux: 0.055
    source: "CGI art. 278-0 bis"
    applicable_a: ["abonnement", "cta", "turpe_fixe"]
    # ATTENTION : Depuis le 1er août 2025 (LFI 2025, art. 20, directive UE),
    # le taux réduit 5,5% est supprimé sur abonnement, CTA et TURPE fixe.
    # TVA 20% uniforme sur toutes les composantes facture.
    # Source : bofip ACTU-2025-00057, service-public.fr, energie-info.fr
    supprime_au: "2025-08-01"

# ── VNU (Versement Nucléaire Universel) — post-ARENH ───────────────────────
# L'ARENH (42 €/MWh, 100 TWh/an) a pris fin le 31/12/2025.
# Le VNU est une taxe redistributive sur EDF, activée uniquement si
# le prix de marché dépasse les seuils fixés par la CRE.
# Source : Loi de souveraineté énergétique, art. L. 336-1 Code énergie
vnu:
  seuil_1_eur_mwh: 78.0
  seuil_2_eur_mwh: 110.0
  statut: "EN VIGUEUR — DORMANT (prix marché ~60 €/MWh < seuil 78)"
  source: "Loi de souveraineté énergétique — VNU au 01/01/2026"
  valid_from: "2026-01-01"
  revision_triennale: "~2028 (CRE)"
  note: "L'ancien ARENH (42 EUR/MWh) n'est plus applicable. Ne plus utiliser comme référence de prix."

