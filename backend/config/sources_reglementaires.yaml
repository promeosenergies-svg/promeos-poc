# PROMEOS — Sources réglementaires SoT (Sprint C-3 Phase 3.2)
#
# YAML statique versionné git → audit trail légal naturel.
# Pattern reproduit identique à tarifs_reglementaires.yaml (Phase 22 deprecated
# par cette livraison Sprint C-3 — cf. note compatibilité regulatory_rates.js).
#
# 9 domaines : co2 / tarifs / accises / tva / dt / bacs / aper / audit_sme / operat
# Schema strict par term :
#   value (number|string), unit (string), domain (string allowlist),
#   source: { label, url, version, effective_date (YYYY-MM-DD), legal_reference|null },
#   formula (string|null), notes (string|null)
#
# Mirroir backend/doctrine/constants.py + config/emission_factors.py +
# config/tarifs_reglementaires.yaml. Si modifié ici, propager partout.
#
# Service de lecture : backend/config/regulatory_sources_loader.py
# Endpoint API : GET /api/regulatory/rates (Sprint C-3 Phase 3.3)

