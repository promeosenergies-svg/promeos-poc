  BILL_ANOMALY_CAPACITY_VARIANCE_THRESHOLD_PCT:
    value: 5.0
    unit: "percent"
    domain: "bill_intelligence"
    source:
      label: "Doctrine PROMEOS Sol §15 Bill Intelligence — détection R20 capacité variance"
