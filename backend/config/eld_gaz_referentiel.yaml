# PROMEOS — Référentiel ELD gaz France (Sprint C-3 Phase 3.6)
#
# 21 entrées : GRDF (national, ~95% du territoire) + 20 ELD locales (Entreprises
# Locales de Distribution gaz, héritages communaux/intercommunaux pré-1946).
#
# Source : data.gouv.fr — Liste des Entreprises Locales de Distribution de gaz
# (URL exacte à vérifier post-Sprint C-3 — Phase 3.6 publié sur la base des
# ELD officiellement référencées CRE et présentes dans l'écosystème PROMEOS).
#
# Schéma strict par entrée :
#   code (string ALL_CAPS), label (string), type ("GRD_NATIONAL"|"ELD_LOCALE"),
#   perimetre (string), site_web (https://), contact_consentement (string|null),
#   notes (string|null)
#
# Service de lecture : backend/config/eld_gaz_loader.py (Phase 3.6.2).
# Cascade : DeliveryPoint.grd_code → bill_recheck via cascade_recompute_service.
#
# Mirroir cohérent : DeliveryPoint.grd_code allowlist post-import flux factures.
# Dette ouverte : URL data.gouv.fr exacte → D-Sprint-C3-ELD-Source-DataGouv-001 (P2).

version: "1.0"
last_updated: "2026-05-04"
sprint_origin: "Sprint C-3 Phase 3.6"
source_label: "CRE — Liste officielle distributeurs de gaz naturel France"
source_url: "https://www.cre.fr/distributeurs-de-gaz-naturel"

