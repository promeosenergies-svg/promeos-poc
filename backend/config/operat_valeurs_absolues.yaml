  # ----------------------------------------------------------
  # ZONES CLIMATIQUES OPERAT — Mapping département → zone AUTHENTIFIÉ
  # ----------------------------------------------------------
  # 8 zones métropole (H1a-H3) + 5 DOM. Source PRIMAIRE OPPOSABLE :
  # Arrêté 10/04/2020 NOR LOGL2005904A annexe III (version consolidée 07/09/2025
  # par arrêté 01/08/2025 NOR ATDL2430864A). Article 2-h définit les zones,
  # Article 5 définit la maille DJU. La colonne "Zclim" de l'annexe III est
  # désormais complète dans le PDF Légifrance v2 (03/05/2026).
  #
  # Données structurées : backend/config/operat_zones_climatiques.json (schema v2.0)
  # Stations météo détaillées : backend/config/operat_stations_meteo.json
  # Resolveur Python   : backend/regops/operat_zones.py
  # Tests structurels  : backend/tests/test_operat_zones_climatiques.py (78 tests ✅)
  #
  # 🟢 CONFIDENCE PASSÉE 🟡 → 🟢 (2026-05-03) : mapping authentifié par recoupement
  # direct sur l'annexe III du PDF Légifrance v2. Cohérence 100% : toutes les
  # stations d'un même département agréent sur leur Zclim. Source primaire opposable.
  #
  # ⚠️ ATTENTION VS CONSENSUS RT 2012 : ~25 départements ont une zone DIFFÉRENTE
  # du consensus RT 2012 communément cité dans la littérature. Notamment :
  # - Est continental (08/10/51/52/54/55/57/67/68/88/90) : H1a → H1b
  # - Limousin (19/23/87) : H2c/H2d → H1c
  # - 84 Vaucluse : H3 → H2d
  # - 45 Loiret : H2b → H1b
  # - 53 Mayenne : H2a → H2b
  # Cf. operat_zones_climatiques.json field changements_v1_a_v2 pour détail.
  # ----------------------------------------------------------
  zones_climatiques:
    source_canonique: "Arrêté 10/04/2020 NOR LOGL2005904A annexe III (version consolidée 07/09/2025 par arrêté 01/08/2025 NOR ATDL2430864A)"
    article_definissant_zones: "Art. 2-h : 'zone climatique nommée H1a, H1b, H1c, H2a, H2b, H2c, H2d ou H3, un regroupement de départements métropolitains ; la zone climatique correspondant à chaque département est précisée dans la dernière colonne Zclim du tableau en annexe III'"
    article_methode_dju: "Art. 5 : 'L'ajustement en fonction des variations climatiques est effectué à la maille départementale ... DJU moyen sur la période 2001-2020'"
    archive_locale_pdf: "docs/sources/regulatory/operat/legifrance_arrete_methode_10_avril_2020_v2_avec_zclim.pdf"
    donnees_structurees: "backend/config/operat_zones_climatiques.json"
    donnees_structurees_stations_meteo: "backend/config/operat_stations_meteo.json"
    resolveur_python: "backend/regops/operat_zones.py"
