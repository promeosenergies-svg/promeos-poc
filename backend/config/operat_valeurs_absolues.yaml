  # ----------------------------------------------------------
  # MÉTHODOLOGIE OFFICIELLE OPERAT (formules ADEME confirmées)
  # ----------------------------------------------------------
  methodologie:

    formule_cabs_2030:
      formule_principale: "Cabs 2030 = CVC(n) + USE(n)"
      sous_formules:
        cvc_n: "CVC(n) = Σ(CVCi × Si) / ΣSi"
        use_n: "USE(n) = Σ(USEi × Si) / ΣSi"
        si: "Si = Surface moyenne annuelle de la sous-catégorie i = Surface déclarée × (Nb jour n / Nb jour i)"
      legende:
        n: "dernière année de déclaration de consommation validée de l'EFA"
        i: "sous-catégorie d'activité déclarée dans la déclaration de consommation de l'année n"
        CVCi: "composante CVC (chauffage-ventilation-climatisation) relative à la sous-catégorie i"
        USEi: "composante USE (usages spécifiques) relative à la sous-catégorie i"
      confidence: "🟢"
      source: "Doc ADEME — OPERAT Documentation utilisateurs Mise à jour Septembre 2025 (Drive 1V3ROcNkcA9j4K3X48BXEWQ8BFehm2iqu)"

    formule_crelat_2030:
      cas_primo_assujetti:
        formule: "Crelat 2030 = Cref × (Cabs2030(n) / Cabs2030(ref)) × (1 - 0.4)"
        legende:
          Cref: "Consommation année de référence ajustée variations climatiques"
          Cabs2030_n: "Objectif valeur absolue 2030 issu année n"
          Cabs2030_ref: "Objectif valeur absolue 2030 théorique issu année de référence"
      cas_changement_occupant:
        formule: "Crelat 2030 = Cref_liée × (Cabs2030(n) / Cabs2030_liée(ref)) × (1 - 0.4)"
        legende:
          Cref_liée: "Moyenne pondérée surfaces liées des consommations de référence de chaque EFA liée"
      confidence: "🟢"
      source: "Doc ADEME 09/2025"

    annee_de_reference:
      regle_attribution: "Pour EFA ayant déclarations avant 2022, année de référence déterminée automatiquement par OPERAT parmi : Période 2010-2019, Conso 2020, Conso 2021, Conso 2022 — sélection optimisant Crelat (objectif valeur relative le plus élevé)"
      regle_post_2022: "Pour EFA dont première année pleine d'exploitation > 2022, année référence = première année pleine d'exploitation déclarée"
      delai_declaration_2010_2019: "Prolongé jusqu'au 30/09/2027 (art. 4 arrêté 20/02/2024) — passé ce délai, attribution automatique"
      confidence: "🟢"
      source: "Doc ADEME 09/2025"

    methode_choix_cabs_vs_crelat:
      regle: "L'assujetti choisit la méthode la plus favorable — Cabs OU Crelat, par EFA. Suffit d'atteindre l'un des deux objectifs pour conformité DEET."
      confidence: "🟢"
      source: "Cerema 2025 ligne 105"

    declaration_sous_categorie_par_defaut:
      regle: "Sous-catégorie 'catégorie X - valeur par défaut' utilisable UNIQUEMENT si plus de 80% surfaces EFA relèvent d'une seule catégorie. Si sélectionnée, aucune autre sous-catégorie ne peut être déclarée pour l'EFA."
      consequence: "Généralement défavorable — objectif Cabs plus contraignant. Indicateur d'intensité d'usage limité à amplitude horaire."
      confidence: "🟢"
      source: "Cerema 2025 lignes 515-587"

    indicateurs_intensite_usage:
      principe: "Chaque sous-catégorie a des valeurs étalons par défaut pour ses indicateurs d'intensité d'usage (IIU). L'assujetti peut soit conserver les valeurs étalons, soit les ajuster pour modulation de l'objectif."
      exemples:
        bureaux: "Nombre postes de travail au m²"
        piscine: "Surface de bassin"
        equipement_sportif_ou_culturel: "Horaires d'ouverture"
        atelier_technique: "Densité énergétique réelle (kWh/m²/an)"
      confidence: "🟢"
      source: "Cerema 2025 lignes 433, 601-607"

