# PROMEOS — Mitigation defaults catalog
#
# Sprint 2 Vague C ét12e (audit Architecture P0 #2 + CFO indirect).
# Externalise les constantes CAPEX/payback/discount/horizon utilisées par
# les détecteurs `event_bus` pour produire `EventMitigation` (doctrine §10).
#
# Versionné côté ParameterStore (cohérent `tarifs_reglementaires.yaml`,
# `pricing_lead_score.yaml`). Toute évolution doit incrémenter `version`
# et noter la source de référence (`source` champ obligatoire).
#
# Règle d'or chiffres (memory feedback 27/04) : fiable + vérifiable +
# simple. Chaque valeur a un commentaire explicatif inline + une source.

version: "1.0.0"
last_updated: "2026-04-27"

# Taux d'actualisation utilisé pour calculer les NPV actualisés (formule
# Σ flux_t / (1+r)^t). 4% est conservateur pour ETI mid-market française
# (cohérent OAT 10 ans + prime risque énergétique). Le CFO peut écraser
# en post-prod via patch YAML versionné si sa politique financière
# diffère.
discount_rate: 0.04  # source : OAT 10y 2026 + prime risque énergétique modeste

# ── Mitigation Décret Tertiaire (compliance_deadline_detector) ────────
dt_compliance:
  # CAPEX moyen audit énergétique réglementaire mid-market + premier batch
  # quick-wins (relamping, GTB simple, calorifuge points chauds). Source :
  # Guide ADEME « Audit énergétique réglementaire » + retours marketplace
  # mid-market 2025 (~5-15 k€/site selon surface). On retient 8 k€ comme
  # médiane démo.
  capex_per_site_eur: 8000.0
  capex_source: "ADEME Guide Audit Énergétique Réglementaire 2025 + retours marketplace mid-market"

  # Payback moyen observé sur opérations quick-wins post-audit (économies
  # ~30% sur 18-24 mois). 9 mois = médiane prudente.
  payback_months: 9
  payback_source: "Retours opérationnels marketplace audits 2024-2025 — médiane 8-12 mois"

  # Horizon DT : trajectoire 2030 obligatoire (Décret n°2019-771).
  npv_horizon_year: 2030
  npv_horizon_source: "Décret n°2019-771 art. 3 — trajectoire -40% 2030"

# ── Mitigation Bill-Intel anomalies (billing_anomaly_detector) ────────
# Pas de CAPEX (contestation juridique, pas de travaux). Le payback est
# l'observation directe `losses.payback_avg_days` du shadow billing v4.2.
# Vague E ét15 (audit P1 tier-2 étendu) : seuils severity et NPV horizon
# externalisés pour cohérence convention ADR-005. Détecteur consommait
# auparavant 3 magic constants inline.
billing_anomaly:
  threshold_critical_eur: 10000.0
  threshold_warning_eur: 2000.0
  threshold_watch_eur: 500.0
  threshold_source: "Calibration mid-market PROMEOS — fourchette ETI 5-200 sites cible Marie/CFO"
  # Horizon NPV : pertes facturation considérées récupérables sur 1 an
  # (cycle contestation typique 3-12 mois). Au-delà, prescription juridique.
  npv_horizon_year_offset: 1
  npv_horizon_source: "Cycle contestation Bill-Intel mid-market 3-12 mois (médiane 4-6 mois)"

# ── Mitigation consumption_drift (consumption_drift_detector) ─────────
# Action comportementale (consignes, horaires, sensibilisation). CAPEX nul,
# payback ~1 mois (impact immédiat dès correction). Valeurs déjà inline
# dans le détecteur car simples — externalisation ici pour cohérence.
# Vague E ét15 : ajout seuils severity € (auparavant magic constants inline).
consumption_drift:
  capex_eur: null  # action comportementale, pas de CAPEX
  payback_months: 1  # impact immédiat (corrections horaires, consignes)
  payback_source: "ADEME ROI sensibilisation usagers — économies récurrentes mensuelles"
  threshold_critical_eur: 5000.0
  threshold_warning_eur: 1000.0
  threshold_watch_eur: 200.0
  threshold_source: "Calibration mid-market PROMEOS — top insights consumption_diagnostic priorisés CFO €"

# ── Renégociation contrat (contract_renewal_detector) ─────────────────
# Sprint 2 Vague C ét14 (audit CFO+Marie P0 #1) : chiffrer la fourchette
# € de risque sur les contrats arrivant à échéance pour permettre l'arbitrage
# CODIR. Avant : impact.value=None → blocage data-room CFO.
#
# Hypothèse : un contrat reconduit tacitement coûte typiquement +12 à +18 %
# vs prix marché spot (médiane CRE Observatoire T4 2025 sur ETI mid-market).
# On retient +15 % comme proxy médian conservateur.
#
# Le chiffrage utilise : conso annuelle proxy (mêmes 100 MWh/site mid-market
# que market_capacity_2026) × prix moyen marché elec/gaz × spread tacite.
contract_renewal:
  # Spread tacite (% du prix marché) — surcoût moyen reconduction tacite
  tacite_spread_pct: 0.15
  tacite_spread_source: "Observatoire CRE T4 2025 + retours marketplace ETI mid-market 2024-2025 — fourchette 12-18 % spot"
  # Prix marché médian utilisé comme base (€/MWh) pour le proxy d'impact
  market_price_elec_eur_per_mwh: 95.0  # médiane spot baseload 2025-2026
  market_price_gaz_eur_per_mwh: 38.0  # médiane PEG 2025-2026
  market_price_source: "EPEX spot baseload moyenne 2025 + PEG indice gaz 2025 (Observatoire CRE)"
  # Volume annuel proxy par annexe site (MWh/an) — cohérent market_capacity_2026
  proxy_volume_per_annex_mwh: 100
  proxy_volume_source: "ADEME bilan énergétique mid-market tertiaire bureau 100 MWh/an/site"

# ── Data quality issue — seuils % données manquantes (data_quality_issue_detector) ──
# Vague E ét15 (audit P1 tier-2 étendu) : seuils basés sur ISO 50001
# §A.6.4.5 (« seuil > 5 % données manquantes invalide signature énergétique »).
# 30/15/5 % mappés sur critical/warning/watch pour priorisation EM.
data_quality:
  threshold_critical_pct: 30.0
  threshold_warning_pct: 15.0
  threshold_watch_pct: 5.0
  threshold_source: "ISO 50001 §A.6.4.5 — seuil > 5 % données manquantes invalide signature énergétique ; 30 % = diagnostic non exploitable"

# ── Action overdue — seuils retard (action_overdue_detector) ──────────
# Vague E ét15 (audit P1 tier-2 étendu) : seuils retard mappés sur la
# matrice (priority initiale × jours retard) → severity. Médiane SLA mid-market.
action_overdue:
  overdue_critical_days: 30
  overdue_warning_days: 7
  overdue_source: "Médiane SLA mid-market PROMEOS — critique/haute = critique dès J+0 ; medium = warning J+7 puis critical J+30 ; low = watch J+30"

# ── Asset registry — coût risque shadow billing aveugle (asset_registry_issue) ──
# Sprint 2 Vague C ét14 (audit CFO P0 #2) : convertir le proxy `count`
# (kWh) en € risque shadow billing. Un PRM sans grd_code rend la facturation
# TURPE/ATRD non-auditable → exposition surfacturation moyenne ~1.2 % du
# total annuel facturé (médiane Bill-Intel insights 2024).
asset_registry:
  # Exposition shadow billing moyenne par PRM/PCE non auditable (€/an)
  blind_billing_exposure_per_dp_eur: 1200.0
  blind_billing_source: "Bill-Intel insights 2024 — pertes médianes 1.2 % du total facturé sur DP non audités, base 100 MWh × 95 €/MWh"
  # Exposition par contrat orphelin sans annexes (€/an) — facturation reçue
  # mais non rattachable, donc non contestable
  orphan_contract_exposure_eur: 5000.0
  orphan_contract_source: "Estimation mid-market : un contrat sans annexe couvre ~5 sites en moyenne × 1k€ exposition shadow billing"

# ── Marché capacité 1/11/2026 (market_window_detector) ────────────────
# Sprint 2 Vague C ét12g (audit Sarah Sequoia P0 #2) : externalise le coût
# indicatif capacité non-couverte (était hardcodé _CAPACITY_COST_PER_MWH_EUR).
# Un partner CRE-savvy va challenger un proxy mid-market non sourcé.
market_capacity_2026:
  # Coût indicatif moyen capacité non-couverte (€/MWh sur consommation
  # annuelle si pas de garantie capacité achetée). Fourchette CRE 8-15 €/MWh
  # selon profil. On retient 12 €/MWh comme proxy mid-market.
  cost_per_mwh_eur: 12.0
  cost_source: "CRE délibération 2025-269 + 2026-49 fourchette 8-15 €/MWh ; médiane mid-market 12 €/MWh"
  # Date d'échéance entrée en vigueur mécanisme capacité physique (RTE).
  deadline_iso: "2026-11-01"
  deadline_source: "Décret n°2025-1441 relatif au mécanisme de capacité — RTE acheteur unique post-ARENH (CRE délibération 2025-269 + 2026-49)"
  # Proxy consommation annuelle par site mid-market tertiaire (MWh).
  # DEBT Vague D : remplacer par sum(site.consommation_annuelle_mwh) quand
  # le champ sera consolidé sur tous les seeds + sites client.
  proxy_consumption_mwh_per_site: 100
  proxy_consumption_source: "Proxy mid-market tertiaire bureau 100 MWh/an/site (ADEME bilan énergétique 2024)"
