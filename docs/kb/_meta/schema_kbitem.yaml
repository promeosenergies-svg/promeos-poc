# CANONICAL KBITEM YAML SCHEMA
# This is the reference schema for all KB items

# Example KB Item (all fields documented)
---
# ===== REQUIRED FIELDS =====

id: "BACS-290KW-DEADLINE-2025"
# Unique identifier (kebab-case recommended)
# Must be unique across all KB items

type: "rule"
# One of: rule, knowledge, checklist, calc
# Must be in taxonomy.types

domain: "reglementaire"
# One of: reglementaire, usages, acc, facturation, flex
# Must be in taxonomy.domains

title: "Obligation BACS pour bâtiments >290 kW"
# Short human-readable title

summary: "Obligation d'installer une GTB (système BACS) avant le 1er janvier 2025 pour tout bâtiment tertiaire dont la puissance nominale de chauffage ou de refroidissement dépasse 290 kW."
# 1-3 sentence summary

tags:
  # All tag lists must contain only taxonomy-approved values
  energy:
    - elec
  segment:
    - tertiaire_multisite
    - collectivite
  asset:
    - hvac
  reg:
    - bacs
  granularity:
    - event  # Obligation déclenchée par événement (construction/réno)
  # OPTIONAL: naf can be empty or contain NAF codes
  naf: []

scope:
  # High-level conditions (null-safe evaluation)
  # If any field is null/missing in site_context, condition = false
  building_type:
    - "bureau"
    - "magasin"
    - "hopital"
  hvac_kw_min: 290
  # Can use any field from site_context
  # Supported comparisons: =, !=, >, >=, <, <=, in, contains, exists

content_md: |
  ## Obligation BACS (Décret n°2020-887)

  ### Seuil
  - Puissance nominale utile (Pn) de chauffage OU de refroidissement > 290 kW

  ### Deadline
  - 1er janvier 2025

  ### Systèmes concernés
  - Systèmes d'automatisation et de contrôle des bâtiments (BACS) = GTB
  - Classes d'efficacité : B ou A (selon norme NF EN ISO 52120-1)

  ### Exemptions
  - Bâtiments avec TRI (temps de retour sur investissement) > 10 ans
  - Nécessite une étude technique préalable

  ### Sanctions
  - Amende jusqu'à 1500 EUR par bâtiment non conforme

  ### Contrôles
  - Inspection obligatoire tous les 5 ans après installation

logic:
  # Deterministic evaluation rules
  when:
    all:  # All conditions must be true
      - field: "hvac_kw"
        op: ">="
        value: 290
      - field: "building_type"
        op: "in"
        value: ["bureau", "magasin", "hopital", "industrie"]

  then:
    outputs:
      - type: "obligation"
        label: "Installer une GTB (classe B ou A)"
        deadline: "2025-01-01"
        severity: "critical"
        details: "Décret n°2020-887 du 22 juillet 2020"

      - type: "next_step"
        label: "Vérifier puissance CVC installée"
        priority: 1

      - type: "next_step"
        label: "Faire réaliser étude TRI si exemption envisagée"
        priority: 2
        condition:
          field: "has_tri_study"
          op: "!="
          value: true

sources:
  # Traceability: where does this knowledge come from?
  - doc_id: "DECRET-2020-887"
    label: "Décret n°2020-887 du 22 juillet 2020"
    section: "Article 2"
    anchor: "#article-2"
    excerpt_short: "Obligation d'installer un système d'automatisation et de contrôle pour les bâtiments dont la puissance nominale utile de chauffage ou de refroidissement est supérieure à 290 kilowatts"
    # OPTIONAL: page number for PDFs
    page: 3

  - doc_id: "NF-EN-ISO-52120-1"
    label: "Norme NF EN ISO 52120-1:2022"
    section: "Classification efficacité énergétique"
    anchor: "#classes"

# ===== REQUIRED METADATA =====

updated_at: "2026-02-09"
# ISO 8601 date

confidence: "high"
# One of: high, medium, low
# Must be in taxonomy.confidence

# ===== OPTIONAL FIELDS =====

priority: 1
# Integer 1-5 (1=highest)
# Used for sorting apply results

notes: |
  Notes internes (non exposées en API apply)
  - Vérifier si rénovation lourde = trigger obligation même si <290kW
  - Cross-ref avec CEE P6 pour aides possibles

---
# Additional examples can follow in separate YAML documents
