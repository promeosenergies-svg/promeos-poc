title: SYNTHÈSE EXÉCUTIVE Aspect Détail Obligation principale Installation d’un BACS
  (GTB classe C min.) pour tous bâtiments tertiaires ≥ 70 kW Seuils clés 290 kW (échéance
  01/01/2025) ; 70 kW (échéance 01/01/2027) Exemption TRI > 10 ans (déduction aides)
  — Justification exigée, conservée 10 ans Inspections Tous les 2 ans (post-installation)
  puis tous les 5 ans ; rapport obligatoire 1 mois ; conservation 10 ans Pas de plateforme
  déclarative Contrairement au Tertiaire (OPERAT) — Conformité via dossiers / preuves
  conservés Fonction clé Suivi horaire énergie, détection pertes efficacité, ajustement
  automatique, pilotage manuel Responsabilité Propriétaire des systèmes CVC ; formation
  exploitant obligatoire
