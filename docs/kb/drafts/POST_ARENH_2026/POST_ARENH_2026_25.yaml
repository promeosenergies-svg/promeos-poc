content_md: "Le cadre post-ARENH applicable au 1er janvier 2026 repose sur une architecture\
  \ réglementaire novatrice : le Versement Nucléaire Universel redistribue les revenus\
  \ excédentaires d’EDF selon des seuils progressifs, tandis que les Contrats d’Allocation\
  \ de Production Nucléaire sécurisent partiellement l’approvisionnement des industriels\
  \ électro-intensifs. Ce dispositif rompt avec la logique de tarif administré uniforme\
  \ pour adopter une logique de marché régulée, fondée sur la transparence des coûts\
  \ complets et une surveillance étroite par la CRE. \n\nPour le court terme (2026-2027),\
  \ l’absence d’activation du VNU du fait des revenus estimés en-dessous des seuils\
  \ de taxation signifie une exposition accrue des consommateurs professionnels à\
  \ la volatilité du marché . Les 250 000+ sites professionnels devront s’adapter\
  \ via des stratégies d’achat renouvelées, une couverture long terme où possible,\
  \ et une diversification des sources de fourniture. La complexité opérationnelle\
  \ du système (guichets de compensation, régularisations, révisions) exige également\
  \ une vigilance accrue de la part des fournisseurs et des gestionnaires d’énergie."
