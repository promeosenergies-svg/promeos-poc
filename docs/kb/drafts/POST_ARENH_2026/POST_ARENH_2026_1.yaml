content_md: 'Le VNU repose sur un partage asymétrique des revenus d’EDF issus du parc
  nucléaire historique. Contrairement à l’ARENH, qui accordait un tarif administré
  à une fraction délimitée des consommateurs, le VNU fonctionne selon une logique
  ex-post : EDF vend intégralement sa production nucléaire au prix du marché de gros,
  puis l’État prélève une part des revenus excédentaires selon des seuils progressifs
  et les redistribue à l’ensemble des consommateurs finals, indépendamment de leur
  fournisseur. 5 6'
