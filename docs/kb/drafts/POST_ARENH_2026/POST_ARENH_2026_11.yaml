content_md: Après chaque année d’application, un guichet de compensation finale ouvre
  en avril de l’année suivante. Sur la base des consommations consolidées ex-post
  remontées par RTE et les gestionnaires de réseaux, la CRE régularise les acomptes
  versés. Les fournisseurs peuvent être amenés à rembourser des excédents ou recevoir
  des régularisations positives.
