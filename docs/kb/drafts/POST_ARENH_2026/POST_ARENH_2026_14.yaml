content_md: "Les CAPN constituent un dispositif complémentaire du VNU, destiné spécifiquement\
  \ aux industriels électro-intensifs et fournisseurs présentant une capacité physique\
  \ d’enlèvement d’électricité en France. Entrés en force le 1er janvier 2026, ces\
  \ contrats visent environ une centaine d’industriels consommant au moins 7 GWh par\
  \ an. 31 \n\nCaractéristiques clés : 32 33 \n- Durée : 10 à 15 ans (bien plus longue\
  \ que l’ARENH annuel). \n- Volume initial : 1 800 MW de capacité allouée, soit environ\
  \ 10 TWh annuels. \n- Mécanisme prix : Prix variable indexé sur les coûts d’exploitation\
  \ et de combustible, complété par une contribution initiale fixée par enchère. \n\
  - Responsabilité : Partage des risques industriels entre EDF et partenaires (arrêts\
  \ de réacteurs, variation de performance)."
