content_md: Un mécanisme de seuil minimal protège le système contre les coûts administratifs
  des micropaiements. Si le tarif unitaire proposé par la CRE est inférieur ou égal
  à 1 €/MWh , aucune minoration n’est appliquée et le montant correspondant est reporté
  à l’année civile suivante. Cette clause de prudence évite une fragmentation administrative
  excessive et favorise l’accumulation de montants redistributifs lors de périodes
  de prix effectivement élevés. 18
