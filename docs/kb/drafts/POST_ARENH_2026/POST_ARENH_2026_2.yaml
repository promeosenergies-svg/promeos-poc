content_md: "La structure du VNU s’articule autour de deux seuils de taxation, fixés\
  \ par arrêté ministériel en application de la loi de finances 2025. Ces seuils sont\
  \ déterminés en fonction du coût complet de production du parc nucléaire historique\
  \ (incluant Flamanville 3), évalué par la Commission de Régulation de l’Énergie\
  \ (CRE). 7 \n\nDans son évaluation du 30 septembre 2025, la CRE a fixé ce coût complet\
  \ à 60,3 €/MWh (ou 61,5 €courants/MWh) pour la période 2026-2028. Sur cette base,\
  \ les seuils de déclenchement des prélèvements ont été arrêtés comme suit : 8 9\
  \ 10 Palier de prix du MWh Part EDF Prélèvement État < 78 €/MWh 100% 0% 78 € à 110\
  \ €/MWh 50% 50% > 110 €/MWh 10% 90% \n\nLe premier seuil (78 €/MWh) correspond au\
  \ coût complet majoré d’environ 18 €/MWh, le second seuil (110 €/MWh) au coût complet\
  \ majoré d’environ 50 €/MWh. Ces marges, comprises dans des fourchettes légales\
  \ (respectivement [5-25] €/MWh et [35-55] €/MWh), offrent à EDF une rémunération\
  \ cohérente de son parc tout en limitant l’accumulation de rentes exceptionnelles.\
  \ 11"
