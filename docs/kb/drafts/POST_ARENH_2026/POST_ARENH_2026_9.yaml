content_md: "La loi prévient une complication opérationnelle en fonction du mode de\
  \ facturation : 24 \n- Clients avec facturation mensuelle réelle : La minoration\
  \ s’applique sur la facture du mois écoulé, permettant au consommateur de percevoir\
  \ effectivement la réduction quelques jours après la fin du mois. \n- Clients avec\
  \ paiement lissé : Seule la facture annuelle de régularisation est obligatoirement\
  \ minorée. Les fournisseurs disposent de marges pour lisser la minoration sur l’ensemble\
  \ de l’année, mais cette discrétion crée des variations difficiles à comparer lors\
  \ de changements de fournisseur. \n\nCe mécanisme deux vitesses risque de susciter\
  \ des incompréhensions, en particulier chez les consommateurs résidentiels non avertis."
