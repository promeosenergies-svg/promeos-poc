content_md: "Le système de guichets de compensation, de régularisations, et de révisions\
  \ (notamment rétroactives) introduit une complexité administrative importante :\
  \ \n- Les fournisseurs doivent maintenir des procédures de déclaration mensuelle\
  \ et annuelles; \n- Les régularisations rétroactives, bien que limitées, demandent\
  \ aux fournisseurs de facturer rétroactivement des montants à leurs clients; \n\
  - La période d’application non-annuelle (avril-octobre) crée des frictions lors\
  \ de changements de fournisseurs."
