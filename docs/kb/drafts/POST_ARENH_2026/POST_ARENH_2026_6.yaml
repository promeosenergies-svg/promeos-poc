content_md: "Un aspect controversé du cadre post-ARENH concerne la période d’application\
  \ par défaut , fixée aux mois d’avril à octobre (jours complets) par le décret.\
  \ Ce choix, bien que justifié par le souci de moduler les signaux tarifaires (inciter\
  \ à la sobriété hivernale), présente plusieurs inconvénients : 19 \n- Effet redistributif\
  \ inéquitable : Les consommateurs à profil thermosensible (chauffage électrique\
  \ hivernal) bénéficient moins de la minoration que les consommateurs à profil «\
  \ en bandeau » (industries, data centers). \n- Complexité de lisibilité : Pour les\
  \ clients finals, les variations mensuelles de grilles tarifaires TTC deviennent\
  \ difficiles à appréhender, notamment lors de changements de fournisseur. \n\nLa\
  \ CRE a émis des réserves explicites sur ce choix, soulignant que l’impact redistributif\
  \ limité ne justifie pas la complexité opérationnelle induite. 20"
