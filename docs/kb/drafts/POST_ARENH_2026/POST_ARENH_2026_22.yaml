content_md: "Les estimations actuelles (66 €/MWh pour 2026, 61 €/MWh pour 2027) placent\
  \ les revenus d’EDF en-dessous du seuil d’activation du VNU (78 €/MWh). Aucune redistribution\
  \ n’est donc attendue sur les deux premières années , sauf en cas de choc externe\
  \ majeur (crise géopolitique, sécheresse sévère, défaillances massives de production\
  \ renouvelable européenne). \n\nCette absence de redistribution fragilise le soutien\
  \ politique au dispositif et laisse les consommateurs sans protection contre la\
  \ volatilité du marché en 2026-2027."
