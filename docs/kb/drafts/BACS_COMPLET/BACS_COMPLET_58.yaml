content_md: 'R9. Non, récalculer base sur occupancy réelle . Règle : “Si bâtiment
  vide > 6 mois année = utiliser seulement années occupées pour moyenne conso”. Exemple
  : 2023 vide 8 mois → 2023 ignorée. 2024 occupé 12 mois, 2025 occupé 12 mois → Moyenne
  = (2024+2025)/2. Conso de base “anormale” (basse vacance) → faux gain énergétique
  → TRI surestime → exemption possible échoue. Audit doit documenter occupancy exacte.'
