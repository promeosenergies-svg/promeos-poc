  dégradée Attestation conformité Certificat “Conforme décret BACS” généré (archivage,
  justificatif audit) Intégrateur ou BE PDF signé horodaté Absence attestation = contestable
  légalement Documentation finale Dossier complet (schémas, paramètres, rapports,
  formation) archivé 10 ans Propriétaire Classeur physique + copie numérique Perte
  doc → risque audit futur'
