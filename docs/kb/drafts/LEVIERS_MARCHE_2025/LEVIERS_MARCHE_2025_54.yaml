content_md: "PROMEOS , en intégrant trois briques modulaires (Data & Conformité, ACC\
  \ Starter, ACC Ops) , devient l’unique plateforme holistique adressant le marché\
  \ ACC en explosion (+144% opérations/an, 161 MW 2025). \n\nDéfis résolus : \n- Montage\
  \ ACC lourd (12–24 mois) → 3–6 mois via automation API + templates \n- Exploitation\
  \ manuelle (80% Excel) → 100% digital shadow billing + SEPA \n- Conformité fragmentée\
  \ (multi-réglementations) → cockpit unique Tertiaire + BACS + APER + accise \n-\
  \ Clés statiques sous-optimales → IA dynamique +5–15% autoconso \n\nAvantage compétitif\
  \ : \n- Enogrid/EnoPower = leader ACC pur ; absent sur compliance tertiaire \n-\
  \ Deepki/Advizeo = leaders compliance ; absent sur ACC opération \n- PROMEOS seul\
  \ combine les deux → valeur client 3–5× supérieure \n\nScénario Central 2030 : \n\
  - 1 200 opérations gérées, 120 000+ participants, 1 800 MW \n- Revenu PROMEOS :\
  \ €2–5M net profit (SaaS scaling + flex monetization) \n- Impact marché : standardisation\
  \ juridique/opérationnelle, scaling collectivités/bailleurs, démocratisation AMEP\
  \ (particuliers) \n\nProchaines étapes (T0 2025) : \n1. Valider MVP 10–12 sem (User\
  \ Testing + Beta 5–10 opérations) \n2. Finaliser roadmap API Enedis (Q1 2025 négociations)\
  \ \n3. Securiser 3–5 « anchor customers » (collectivité/bailleur pour pilots) \n\
  4. Levée seed financing (€800k–1.2M) pour dev scale + go-to-market \n\nDates sources\
  \ utilisées : 5 décembre 2024 – 30 décembre 2025 (données Enedis, Enogrid, TECSOL,\
  \ EDF OA, CRE, Enedis guides 2025, arrêtés législatifs jusqu’à février 2025). \n\
