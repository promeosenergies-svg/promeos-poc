  ratio[0–100], effective_date)


  -- Factures internes

  Table Invoice_Internal (id, pmo_id, consumer_id, month, kwh_local, tarif, total_eur,
  status[draft|sent|paid], due_date)


  -- Paiements SEPA

  Table Payment_SEPA (id, invoice_id, mandate_id, status[pending|collected|failed],
  collected_date)'
