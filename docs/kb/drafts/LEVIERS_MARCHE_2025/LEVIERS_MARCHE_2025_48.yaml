  \ API Enedis\n AC:\n - Submit dossier opération ACC (US-009) lance API call\n -\
  \ Body : PMO data, participants list, clés, convention\n - Récep response Enedis\
  \ : request ID + status \"en attente validation\"\n - Polling status quotidien (via\
  \ API)\n - Alert PMO si status change (ex: \"validée\" ou \"demande info supplémentaire\"\
  )\n\nUS-013 [S] En tant que PMO, je mets en place SEPA\n AC:\n - Section \"Paiements\
  \ SEPA\" dans PMO workspace\n - Générer mandats SDD (texte standard + code mandat)\n\
  \ - Participant signe mandat (e-sig, ou print+post)\n - Mandat stocké encrypted\
  \ vault\n - Test prélèvement € (crédit sample, reversible)\n - Prélèvements auto\
  \ chaque mois (batch, post-facturation)\n - Dashboard \"Prélèvements\" : list mandates,\
  \ % collectés, failures + retry logic\n\nUS-014 [S] En tant que energy manager,\
  \ je suivi conformité Décret Tertiaire (bêta)\n AC:\n - Import site tertiaire (surface\
  \ m², année référence, type [bureaux|école|etc])\n - Baseline : 2010–2019 conso\
  \ (upload historique ou estimation)\n - Trajectory compute : (conso 2025 climate-corrigée)\
  \ vs (baseline × (100–40)%)\n - Dashboard : % atteinte objectif 2030\n - Alert si\
  \ risque dépassement\n - Export report (simple pour T0)\n - (T1 : intégration full\
  \ OPERAT API)"
