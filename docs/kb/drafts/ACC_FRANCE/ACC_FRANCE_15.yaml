content_md: "Cas type : Immeuble collectif HLM 100+ logements + toit PV 50–150 kWc\
  \ \n\nModèle opérationnel : \n- PMO = bailleur lui-même (exception légale, bailleurs\
  \ sociaux) \n- Électricité produite → priorité charges communes (ascenseurs, couloirs,\
  \ eau chaude) \n- Surplus → participants logements (consentants parmi locataires)\
  \ \n- Bénéfice : réduction charges communes ~15–25%/an, lutte précarité énergétique\
  \ \n\nROI économique : 61 62 \n- Investissement CAPEX : ~€80–120k pour 50 kWc (aides\
  \ CRE/régionales : €20–40k) \n- Économies annuelles : €12–18k (conso communes +\
  \ survalue locataires) \n- Payback : 5–8 ans (avec aides); 10–12 ans (sans) \n-\
  \ Sensibilité : très bonne si > 30% taux autocons. \n\nCas clients réels : \n- Habitat\
  \ 17 (78m² PV, 78 logements) \n- Habitat Hauts-de-France (exploitée via Enogrid)\
  \ \n- RIVP Nord (Paris, multi-sites)"
