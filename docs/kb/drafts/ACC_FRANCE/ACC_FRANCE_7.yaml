  \ capacité (statuts, trésorerie, mandat direction) \n\nDélais typiques : 36 37 \n\
  - Instruction Enedis : 5 jours ouvrés (notification date démarrage) \n- Raccordement\
  \ « simple » : 2 mois \n- Raccordement « complexe » (HTA, travaux réseau) : 12–18\
