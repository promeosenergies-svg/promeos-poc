content_md: "Cas type 1 : ZAC/parc activités \n- Producteur = entité municipale ou\
  \ SEM \n- Consommateurs = 5–15 entreprises petit/moyen (manufactures, commerces,\
  \ services) \n- Modèle = vente AC à prix « local » (€0.12–0.18/kWh vs marché €0.20+)\
  \ \n- Complexité : clés dynamiques, entrées/sorties entreprises, multi-secteurs\
  \ consommation \n\nCas type 2 : Patrimoine public mutualisé \n- Mairie + écoles\
  \ + médiathèque + piscine = PMO \n- Autocons. simple (même commune), clés statiques\
  \ par bâtiment \n- Avantage : aucun participant privé, gouvernance simple \n- Baisse\
  \ consommation électricité : 12–20%/an \n\nCas clients : Communes Occitanie/Bretagne\
  \ (données SER 2024), collectivités Normandie (FNCCR accompagnement)"
