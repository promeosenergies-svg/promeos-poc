content_md: "L’arrêté du 21 février 2025 (publié JO 5 mars 2025) constitue une avancée\
  \ importante du cadre réglementaire de l’autoconsommation collective en France.\
  \ Par l’augmentation des seuils de puissance (3 → 5 MW, avec dérogation 10 MW pour\
  \ collectivités) et la création d’une dérogation EPCI aux critères géographiques,\
  \ il élargit significativement les opportunités de projets collectifs, tout en maintenant\
  \ l’exigence de proximité locale. L’ajout de la dérogation SIS (2 mai 2025) renforce\
  \ cette tendance libéralisatrice. Enedis et les Personnes Morales Organisatrices\
  \ doivent adapter leurs processus d’implémentation, notamment via les nouvelles\
  \ clés de répartition “Full Dynamique” et les interfaces automatisées pour la facturation.\
