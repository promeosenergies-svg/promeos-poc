content_md: "La PMO est l’élément central de la gouvernance d’une opération ACC :\
  \ \n- Définition: Entité juridique liant contractuellement producteurs et consommateurs\
  \ finaux (forme libre : association, coopérative, copropriété, SEM, etc.) \n- Responsabilités\
  \ principales: \n- Choix et transmission des clés de répartition de l’électricité\
  \ à Enedis 23 \n- Gestion administrative de l’opération et communication avec les\
  \ participants \n- Signature de la convention d’autoconsommation collective avec\
  \ le fournisseur (EDF obligation d’achat pour métropole continentale) \n- Dépôt\
  \ et suivi des demandes de dérogation auprès du ministère chargé de l’Énergie (si\
  \ applicable)"
