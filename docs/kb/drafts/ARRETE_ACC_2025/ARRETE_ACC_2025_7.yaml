content_md: "La dérogation créée par l’arrêté du 21 février 2025 pour les communes\
  \ et EPCI permet un périmètre sans limite géographique explicite, tant qu’il reste\
  \ exclusivement au sein du ressort de l’EPCI participant. Cela signifie : 19 \n\
  - Un EPCI de plusieurs centaines de km² peut englober l’ensemble de son territoire\
  \ \n- Aucune limite km n’est spécifiée dans le texte \n- Le critère délimitant est\
  \ la frontière administrative de la collectivité, non une distance"
