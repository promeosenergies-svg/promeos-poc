content_md: 'La flexibilité électrique (capacité à moduler consommation/production)
  est devenue stratégique. En France, trois mécanismes réglementés principaux permettent
  la valorisation B2B : NEBEF (effacement explicite, marché de l’énergie via EPEX
  SPOT), Réserves/Ajustement (services système RTE, appels d’offres et temps réel),
  et Mécanisme de Capacité (nouveau en nov. 2026, enchères centralisées). Une flexibilité
  implicite existe via pilotage prix spot/négatifs. Accès via agrégateurs (regroupement
  multi-sites) ou direct (>15 MW). Mesure rigoureuse (baseline, courbe charge Enedis),
  pénalités écarts, rémunération post-livraison.'
