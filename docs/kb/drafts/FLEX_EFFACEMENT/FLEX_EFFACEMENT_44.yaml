content_md: "La flexibilité électrique française offre revenus durables et régulés\
  \ (€300–800k/an, 10–50 MW) via trois piliers : NEBEF (court terme, accès facile\
  \ via agrégateurs), Réserves (stabilité prime fixe), Capacité (long terme, nouveau\
  \ mécanisme 2026). Multi-sites B2B via agrégateurs = modèle scalable sans équipes\
  \ IT dédiées client. \n\nSuccès conditionné à : baselines solides, data Enedis fluide,\
  \ contrats clairs clients (flexibilité non-pénalisante), instrumentation (GTB/API).\
  \ ROI réaliste 18–24 mois ; revenu net 15–18% margins post-coûts. \n\nPriorité 2025\
  \ : Déployer NEBEF NOW (règles stables, revenue immédiat) ; préparer Réserves/Capacité\
  \ 2026–2027 en parallèle. \n\nDernière mise à jour : 29 décembre 2025, 12:49 CET\
