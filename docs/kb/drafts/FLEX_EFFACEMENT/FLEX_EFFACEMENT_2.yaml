content_md: "Actifs : Sites de soutirage (RPT/RPD) capables d’effacer ≥100 kW par\
  \ bloc. Tout secteur (tertiaire multi-sites, industrie, stockage, IRVE), sauf sites\
  \ avec production auto-consommation obligatoire ou primes d’énergie renouvelable\
  \ (sauf détection déclaration EIF spécifique). 2 \n\nAgrégateur : Personne morale,\
  \ accord participation NEBEF signé avec RTE, agrément technique (capacité, fiabilité).\
  \ Durée homologation = 1–3 ans selon fiabilité (norme à 80%). Prérequis : responsable\
  \ d’équilibre (directement ou via tiers). \n\nSites : Accord écrit du titulaire\
  \ CAR (Contrat Accès Réseau) ; télérelevés ou profilés (Linky + API) ; comptage\
  \ à la demande possible (sous-mesure, expérimental). Confidentialité respectée (RGPD)."
