content_md: "NEBEF est un mécanisme réglementé d’effacement explicite permettant la\
  \ valorisation de la réduction de consommation (ou augmentation chez producteurs)\
  \ sur le marché SPOT (EPEX) et le mécanisme d’ajustement . RTE gère centralement\
  \ les règles ; Opérateurs d’Effacement (OE) agrès par RTE contractualisent avec\
  \ consommateurs ; déclaration des effacements en J-1 9h30–22h ou Intraday ; RTE\
  \ retient les offres les plus compétitives ; paiement aux fournisseurs via barèmes\
  \ forfaitaires (modèle régulé) ou gré-à-gré. 1 \n\nFlux type multi-sites B2B : \n\
  - Agrégateur signe accord participation NEBEF + agrément technique RTE. \n- Agrégateur\
  \ contractualise avec sites (GTB, HVAC, froid, industriels). \n- Chaque jour, agrégateur\
  \ déclare “bloc d’effacement” (capacité + site) à RTE. \n- RTE valide, retient offres\
  \ ; activation J (15 min min., rythme 15/45 possible). \n- Mesure via baseline (courbe\
  \ référence = consommation sans effacement) vs. courbe réelle. \n- RTE calcule énergie\
  \ effacée ; versement Fournisseur = barème forfaitaire × énergie."
