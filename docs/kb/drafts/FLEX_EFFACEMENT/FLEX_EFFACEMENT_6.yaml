  \ suspension (défaut >20j), résiliation (défaut persistant), appel garantie bancaire.\
  \ \n\nContrôle du Réalisé (Article 7.3-7.4) : \n- Écart report >30% >2/6 mois →\
  \ reports ignorés 3 mois suivants. \n- Faux déclaration (bloc maquillé) → pénalité\
  \ administrative CRE (nullité contrat secteur). \n\nRisques Opérationnels : \n-\
  \ Baseline contestée : refus paiement si méthode défaillante. \n- Indisponibilité\
  \ GTB : activation échouée = non-rémunération. \n- Conformité électrique : disjonction\
  \ si sécurité compromise."
