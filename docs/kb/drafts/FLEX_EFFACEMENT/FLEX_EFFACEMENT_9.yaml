  \ Primaire) : Régulation automatique, continu, harmonisée Europe (ENTSO-E). Activation\
  \ = déviation fréquence ±0.2 Hz. Durée 30 sec. \n- aFRR (Réserve Secondaire) : Régulation\
  \ auto-RTE, français, 15–90 sec après primaire. Appels d’offres nationaux. \n- mFRR\
  \ (Réserve Rapide tertiaire) : Manuelle, <13 min, adjudication appel d’offres périodique/journalière\
  \ RTE. \n- RR-RC (Réserve Rapide/Complémentaire) : Manuel, <30 min, AOP trimestriel/journalier\
  \ (2025 : nouveaux volumes, nouvelle procédure) [artifact:]. \n\nActeur d’Ajustement\
  \ (AA) = fournisseur réserves via Mécanisme d’Ajustement (MA) . Offres “hausse/baisse”\
  \ (modulation puissance). Obligation participation EnR >10 MW depuis 01/01/2026.\
