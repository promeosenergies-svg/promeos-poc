content_md: "Possible avec : \n- ✅ Réserves (FCR, aFRR) : Oui (simultané si contrats\
  \ cohérents, ex. flexi downside pour aFRR + NEBEF downside). \n- ✅ Mécanisme d’Ajustement\
  \ (MA) : Oui (déclaration parallèle, priorité réserves > ajustement). \n- ✅ Capacité\
  \ : Oui (certification indépendante, engagement certaine heures, NEBEF hors engagement).\
  \ \n- ✅ Flexibilité locale (congestion) : Oui (zones disjointes généralement). \n\
  - ⚠️ Arbitrage Prix implicite : Oui (pilotage hors offre formelle), mais caution\
  \ contractuelle fournisseur. \n\nLimites : \n- Double-comptage énergétique interdit\
  \ (ex. même kWh ne peut être effacé 2× dans MA + NEBEF J-1). \n- Priorité réglementaire\
  \ : Réglage Primaire > Secondaire > mFRR > Ajustement/NEBEF (activation séquentielle).\
  \ \n- Cohérence contractuelle : Engagements doivent être compatibles (ex. 3 MW réserves\
  \ + 2 MW NEBEF max = possible)."
