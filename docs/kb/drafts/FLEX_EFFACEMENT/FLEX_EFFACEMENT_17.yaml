content_md: "Capacités Nouvelles (pluriannuelles, R. 316-39)[artifact:] : \n- Installations\
  \ avec autorisation exploitation post-référence (à définir). \n- Augmentations puissance\
  \ ; prolongations durée vie ; investissements réduction émissions (plafond CO2).\
  \ \n- Effacements nouveaux SANS soutien public antérieur (ex. non-AOE, non-AOFD).\
  \ \n- Exclusion : Charbon/tourbe/schiste (>550 g CO2/kWh existants 01/01/2025),\
  \ contrats soutien public incompatibles. \n\nCapacités Existantes (AL-1 surtout)\
  \ : Tous, soumis Prix Plafond Intermédiaire (PPI) = plafond prix pour existants,\
  \ sauf dérogation CRE si missing-money > PPI (R. 316-28).[artifact:] \n\nProcédure\
  \ Certification : Titulaire Périmètre Certification (TPC) dépose demande RTE, guichet\
  \ pre-enchère. GRT approuve (pour RPT : RTE ; RPD : Enedis + RTE). Convention entre\
  \ GRT/exploitant (R. 316-6)."
