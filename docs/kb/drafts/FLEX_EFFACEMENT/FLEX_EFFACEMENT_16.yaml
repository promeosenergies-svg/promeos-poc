content_md: "Remplaçant ancien mécanisme (fin nov. 2026), le nouveau mécanisme de\
  \ capacité centralisé procure rémunération pour engagement disponibilité (non activation)\
  \ période de livraison (généralement année civile).[artifact:] Architecture simplifié\
  \ : \n- Ministre fixe besoin capacité sur proposition CRE (rapport RTE). \n- RTE\
  \ organise enchères centralisées (AL-4 et AL-1 = année-4 et année-1 avant livraison).\
  \ \n- Entités de Certification (EDC : producteurs, agrégateurs, OE effacement) soumettent\
  \ offres. \n- Rémunération au prix marginal (sauf plafonds, dérogations). \n- Post-livraison\
  \ : vérification disponibilité effective (M+3 initial, M+18 régularisation), pénalités\
  \ écarts. \n\nEffacement accédé via Opérateur d’Effacement certifiant capacité.\
  \ Engagement = puissance disponible jours “PP2” (jour-pointe prévisionnels hiver/été)."
