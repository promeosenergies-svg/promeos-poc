content_md: |
  ## Veille énergie — semaine 20 2026 (10 au 16 mai)

  Période couverte : 10/05/2026 → 16/05/2026. Consolidation de 2 rapports
  hebdomadaires (focus France/CRE + focus global/géopolitique).

  ### Fil conducteur de la semaine
  La CRE cadre réglementairement la **flexibilité de la demande** : le même
  jour (11/05) elle annonce la baisse du prix repère gaz, lance l'expérimentation
  des tarifs dynamiques, et valide la nouvelle rémunération du service système
  tension. En parallèle le marché spot bat un record négatif (-498 €/MWh) et la
  modulation nucléaire française a été multipliée par 7,6 depuis 2019.

  ### Index des drafts S20
  - `VEILLE_S20_2026_1` — Baisse du prix repère gaz (PRVG) -4,8 % au 1/06/2026
  - `VEILLE_S20_2026_2` — Expérimentation CRE des tarifs dynamiques (TRV)
  - `VEILLE_S20_2026_3` — Nouvelles règles service système tension RTE
  - `VEILLE_S20_2026_4` — Extension du champ d'application de la RE2020
  - `VEILLE_S20_2026_5` — Appels d'offres ENR (PPE2 éolien, offshore 10 GW, PV)
  - `VEILLE_S20_2026_6` — Marché élec : prix négatifs record + modulation nucléaire
  - `VEILLE_S20_2026_7` — Flexibilité : baromètre RTE + dynamique NEBCO
  - `VEILLE_S20_2026_8` — Gaz & géopolitique : stockage UE, GNL, détroit d'Ormuz

  ### Implications PROMEOS (transverses)
  - Cohérent avec la priorité absolue Flex/Pilotage (doctrine simple + différenciant).
  - Wedge facture + conformité : RE2020 élargie ouvre un nouveau périmètre tertiaire ;
    la baisse du PRVG impacte les offres gaz indexées.
  - Filtrer les idées-features des rapports via la doctrine v1.3 (PROMEOS n'est pas
    un EMS vertical ni un agrégateur).
