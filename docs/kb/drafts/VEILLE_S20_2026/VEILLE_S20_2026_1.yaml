content_md: |
  ## Baisse du prix repère gaz (PRVG) — 1er juin 2026

  ### Fait
  Le 11/05/2026, la CRE a indiqué que le **prix repère de vente de gaz naturel
  (PRVG)** baissera de **-4,8 % TTC au 1er juin 2026** :
  - de **160,54 €/MWh TTC** (valeur de mai 2026)
  - à **152,86 €/MWh TTC** (valeur de juin 2026)

  Impact estimé : **≈ -1,26 € TTC** sur la facture mensuelle des consommateurs
  professionnels dont l'offre est indexée sur le PRVG.

  ### Contexte
  Cette baisse s'explique par la détente des marchés de gros après un mois de
  mars marqué par la crise au Moyen-Orient. Elle reste conjoncturelle : le PRVG
  de mai 2026 affichait encore +15,4 % vs avril (0,16054 €/kWh TTC, 0,11314 HT).

  ### Implication PROMEOS
  Donnée à versionner pour le module d'analyse de contrat et l'audit des offres
  gaz indexées sur le PRVG. Correspond à la clé `prix_repere_gaz` de
  `backend/config/tarifs_reglementaires.yaml` : prévoir la bascule
  `rate_eur_mwh: 152.86` / `valid_from: 2026-06-01` (previous 160,54 au 1/05).
  Non directement consommé par le shadow billing (qui reconstitue ATRD+ATRT+fourniture).
