content_md: |
  ## Marché électricité — prix négatifs et modulation nucléaire

  ### Faits — prix
  - **Record de prix day-ahead négatif : -498 €/MWh** atteint début mai 2026
    (dépasse le précédent record de -479 €/MWh du 26/04).
  - En avril 2026, **90 % des jours** ont enregistré des prix day-ahead **nuls
    ou négatifs** en France.
  - Cause : essor du solaire (**+6 GW en 2025**) + faible flexibilité nucléaire.
  - Offre élec dynamique (indexée spot, Selectra) le 13/05 : 0,0791 €/kWh TTC
    (-34,4 % vs veille). Spot 18/05 : FR 79 €/MWh, Norvège 62, Roumanie 143.

  ### Faits — modulation nucléaire
  - Différentiel moyen production nucléaire midi vs pic du soir (avr-sept) :
    **582 MW en 2019 → 4 426 MW en 2025** (×7,6).
  - Modulation nucléaire annuelle : **33 TWh en 2025** (vs 15 TWh en 2019).
  - T1 2026 : différentiel midi-soir déjà ~2 500 MW.
  - France exportatrice nette **98,5 % des heures de 2025** (solde record 92,3 TWh).

  ### Implication PROMEOS
  La flexibilité devient un arbitrage économique permanent, plus une exception
  de pointe. Conforte la priorité Flex/Pilotage : valeur du déplacement de
  charge vers la mi-journée (prix bas/négatifs). Data points pour les
  projections prix du module Market & Price Intelligence.
