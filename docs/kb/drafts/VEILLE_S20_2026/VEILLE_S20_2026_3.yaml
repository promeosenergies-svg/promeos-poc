content_md: |
  ## Service système tension RTE — nouvelles règles

  ### Fait
  La CRE a validé le 11/05/2026 l'évolution du service de réglage de tension
  proposé par RTE :
  - rémunération désormais liée à l'**énergie réactive réellement fournie**
  - **modulée selon la disponibilité** de l'unité
  - **pénalités** en cas de non-respect
  - **ouverture aux producteurs ENR**
  - **entrée en vigueur : 1er janvier 2027**

  ### Analyse
  Les unités flexibles (batteries, compensateurs statiques) y trouvent une
  nouvelle source de revenus. Les producteurs ENR et les sites industriels
  dotés d'équipements de compensation réactive pourront obtenir des revenus
  complémentaires, sous réserve de tenir leurs engagements de disponibilité.

  ### Implication PROMEOS
  Composante de valorisation des actifs flexibles à connaître pour le module
  Achat / Flex Advisory (M&V). Hors socle : PROMEOS n'opère pas les actifs ;
  l'intérêt est informationnel (indicateur de revenus potentiels), pas opérationnel.
  Ne pas sur-promettre vs doctrine v1.3.
