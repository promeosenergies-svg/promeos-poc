content_md: |
  ## RE2020 — extension du champ d'application

  ### Fait
  Un décret du **15/01/2026**, entré en vigueur le **1er mai 2026**, élargit
  l'application de la RE2020 à de nouveaux types de bâtiments :
  - hôtels
  - commerces
  - restaurants
  - établissements scolaires
  - établissements de santé

  Il introduit également un **nouvel indicateur d'énergie primaire renouvelable**.

  ### Analyse
  Les promoteurs et maîtres d'ouvrage B2B (hôtels, commerces, bureaux) doivent
  intégrer ce nouvel indicateur et anticiper des obligations de performance
  énergétique renforcées. Cela crée des opportunités pour les ESCO, les CPE
  (contrats de performance énergétique), les CEE et les développeurs PV.

  ### Implication PROMEOS
  Nouveau périmètre de bâtiments tertiaires neufs à intégrer au scoring de
  conformité RegOps. À cataloguer aux côtés du Décret Tertiaire / BACS / OPERAT.
  S'inscrit dans le wedge conformité.

  ### Note taxonomie
  RE2020 n'a pas de valeur dédiée dans la taxonomie KB `reg` ; tag `decret_tertiaire`
  retenu comme proxy "réglementation performance énergétique des bâtiments".
