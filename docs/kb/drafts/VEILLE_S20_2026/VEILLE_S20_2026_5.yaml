content_md: |
  ## Appels d'offres ENR — mai 2026

  ### Faits
  - **Éolien terrestre PPE2 — période 11 (P11)** : cahier des charges CRE,
    volume **800 MW**, candidatures ouvertes du **11/05 au 21/05/2026 23h59**.
    Notation sur le prix et le financement participatif.
  - **Éolien en mer — AO unique** : le gouvernement fusionne les 9e et 10e AO
    en un **appel d'offres unique de 10 GW** : **5 GW posé + 5 GW flottant**.
    Sélection des premiers lauréats prévue **fin 2026 / début 2027**.
  - **Photovoltaïque** : appels d'offres prévus en **juillet 2026** :
    **288 MW en toiture + 925 MW au sol**.

  ### Analyse
  Le volume éolien terrestre limité (800 MW) et l'échéance courte (21/05)
  imposent une sélection compétitive. L'éolien flottant, moins mature, exige
  des partenariats industriels. Ces AO créent une fenêtre pour décrocher des PPA.

  ### Implication PROMEOS
  Hors socle PROMEOS (développement ENR / candidature AO ≠ tour de contrôle
  énergétique du client B2B). Intérêt limité à la veille : signal de marché PPA
  / autoconsommation pour les clients tertiaires multi-sites concernés.
