content_md: |
  ## Flexibilité — baromètre RTE 2026 & NEBCO

  ### Faits
  Baromètre RTE des flexibilités (avril 2026) :
  - Consommation électrique française **stable ~450 TWh** (l'électrification
    n'a pas progressé depuis la crise 2022-2023).
  - La flexibilité demandée se déplace du **lissage des pointes hivernales**
    vers **l'absorption des surplus de mi-journée**.
  - Amplitude de la **consommation résiduelle : 14 GW**.

  Mécanisme NEBCO :
  - Nombre de sites inscrits : **230 000 → 708 000** entre septembre 2025 et
    janvier 2026 (×3 en ~4 mois).

  ### Analyse
  Les programmes d'effacement et de capacité (aFRR, mFRR) deviennent cruciaux.
  Les agrégateurs B2B élargissent leur portefeuille (tertiaire, industrie légère)
  et investissent dans le pilotage temps réel.

  ### Implication PROMEOS
  Confirme la dynamique structurelle de la flexibilité (cohérent baromètre flex
  et étude Endesa déjà en KB mémoire). Le NEBCO ×3 valide le potentiel du
  Cockpit Flex / Pilotage côté inscription + suivi des revenus, en partenariat
  agrégateur (modèle Option B+C, sans opérer l'effacement directement).
