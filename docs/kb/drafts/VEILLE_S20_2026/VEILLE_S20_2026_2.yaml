content_md: |
  ## Expérimentation tarification dynamique (TRV électricité)

  ### Fait
  Suite au décret du 30/04/2026, la CRE a précisé le 11/05/2026 les modalités
  d'une expérimentation sur les tarifs réglementés de vente d'électricité (TRV) :
  - **6 600 clients** de **3 à 6 kVA** (sélection aléatoire)
  - période : **1er octobre 2026 → 1er octobre 2027**
  - 3 profils tarifaires testés :
    1. base / pointe hiver
    2. base / pointe hiver + heures creuses été
    3. groupe témoin
  - **protection client** : facture plafonnée au montant qu'ils auraient payé
    au tarif de base classique.

  ### Analyse
  Signal réglementaire fort en faveur de la flexibilité de la demande. Les
  fournisseurs B2B pourront s'inspirer de ces structures (avec clauses plafond)
  pour des offres dynamiques, mais devront investir dans l'accompagnement et le
  pilotage. À rapprocher de la généralisation des prix spot négatifs.

  ### Implication PROMEOS
  Conforte la pertinence d'un simulateur d'offres (fixe / indexé / dynamique)
  avec plafond de facturation, dans le wedge facture. Le pilotage de charge
  associé relève de la priorité Flex/Pilotage.
