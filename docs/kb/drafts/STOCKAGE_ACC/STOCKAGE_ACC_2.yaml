content_md: "Terminologie souvent confuse : Concept Définition Portée Batterie Taux\
  \ d’Autoconsommation (TAc) kWh produits localement consommés sur site / kWh produits\
  \ × 100 Batterie améliore TAc de 10–30% (ex : 50% → 70%), sauf si ACC sans batterie\
  \ > 40% déjà Taux d’Autoproduction (TAp) kWh produits localement / kWh consommés\
  \ × 100 TAp indépendant batterie (défini par PV puissance), mais batterie rend le\
  \ TAp utilisable (décale production midi → conso soir) Autonomie de durée Temps\
  \ couverture conso sans approvisionnement externe (heures) Batterie 4 kWh → 4h autonomie\
  \ (cas typique ACC sur 1 kW conso). Suffit nuit locale (20h non-prod PV), pas assez\
  \ saisonnalité Indépendance énergétique Couvrir 100% conso annuelle sans réseau\
  \ Impossible batterie seule : exige oversize saisonnier (jours forts hiver) = 50–100×\
  \ batterie court-terme. Hybridation hydrogène/STEP ou réseau incontournable \n\n\
  Point critique : beaucoup de porteurs ACC confondent TAc/autonomie et imaginent\
  \ que batterie 10 kWh offre 10 h autonomie. En réalité, si ACC 50 kW pics, 10 kWh\
  \ = 12 min seulement ! Clarifier le besoin (pic vs décalage temporel) dès le départ."
