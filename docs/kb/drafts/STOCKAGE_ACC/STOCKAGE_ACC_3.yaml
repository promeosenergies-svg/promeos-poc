content_md: "Cadre légal : Décret 2017-676 (ACC), décret 2023-256 (approche PMO),\
  \ ordonnance 2023-1110 (Electricity Directive transposition). Règles clés : \n-\
  \ Rayon 2 km maximal entre producteur/consommateur (en ligne électrique, pas vol\
  \ d’oiseau) \n- Points de livraison multiples (> 1 production, > 1 conso) → repartition\
  \ via clé (fixe ou dynamique mensuelle) \n- Personne Morale Organisatrice (PMO)\
  \ responsable administratif/fisc \n- Mesure 15 min par point via Linky (quasi-temps\
  \ réel Enedis API) \n- GRD Enedis approuve ACC, gère comptage/facturation par participant\
  \ (en France UTE/distribution) \n\nPas de stockage prévu nativement dans réglementACC\
  \ : batterie = actif externe pilotable (EMS peut la charger/décharger) mais comptage\
  \ reste au PDL (point de livraison). Schéma de raccordement = clé : batterie en\
  \ arrière-compteur (derrière producteur) vs batterie sur réseau commun vs batterie\
  \ chez consommateur."
