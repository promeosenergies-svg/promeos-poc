content_md: "Stabilité RTE : parc nucléaire 51 GW garantis + hydraulique 16 GW + gaz\
  \ 11 GW = 83 GW de capacité régulée. Pic consommation hiver ~95 GW (cas froid extrême)\
  \ couvrable par imports. Bilan prévisionnel RTE 2025-2035 : position avantageuse,\
  \ abondance électricité. \n\nMais fragile : dépendance imports allemands en cas\
  \ déficit ENRi hivernaux. RTE redoute scénarios « wind drought » = demande haute,\
  \ peu vent/soleil ailleurs = pics prix européens touchent France via interconnexions.\
  \ \n\nImplication PROMEOS : France bénéficie prix bas moyen terme (nucléaire stable),\
  \ mais risque pics hivernaux imprévisibles (2-3 fois/hiver). Contrats couvrant hiver\
  \ obligatoires, pas court terme."
