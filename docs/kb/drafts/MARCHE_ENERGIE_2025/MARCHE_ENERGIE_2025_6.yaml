content_md: "Fonctionnement clé : \n- Fournisseurs alternatifs (Engie, Eni, Vattenfall,\
  \ etc.) peuvent acheter électricité nucléaire EDF à prix régulé 42€/MWh \n- Volume\
  \ plafonné 100 TWh/an (~25% production nucléaire) \n- Reste à prix marché (quand\
  \ >100 TWh, écrêtement au prorata) \n- Prix fixe depuis 2012, jamais révisé upward—créait\
  \ avantage concurrentiel fournisseurs \n\nImpact concurrence : \n- EDF : penalisée\
  \ (vend nucléaire à 42€ vs marché 55-75€) → revenus insuffisants entretien parc\
  \ \n- Fournisseurs alternatifs : profitent accès bon marché, peuvent agresser tarifs\
  \ petits clients \n- Consommateurs : illusion protection (ARENH favorise churn,\
  \ mais factures resteraient hautes marché) \n- UE : juge dispositif dépassé, crée\
  \ distorsion concurrence intra-UE"
