content_md: |
  ## Ratios de consommation - Bureaux tertiaires

  ### Moyennes nationales
  - **Minimum**: 150 kWh/m²/an (bureaux BBC, faible densité IT)
  - **Moyenne**: 180 kWh/m²/an
  - **Maximum**: 250 kWh/m²/an (bureaux anciens, forte densité IT)

  ### Répartition par usage
  - CVC (chauffage/clim/ventilation): 45-55%
  - Éclairage: 20-25%
  - IT/bureautique: 15-20%
  - Autres (ascenseurs, cafétéria, etc.): 10-15%

  ### Facteurs de variation
  - Zone climatique (H1/H2/H3)
  - Densité d'occupation (m²/personne)
  - Équipements IT (data rooms, serveurs)
  - Isolation thermique (année construction)

