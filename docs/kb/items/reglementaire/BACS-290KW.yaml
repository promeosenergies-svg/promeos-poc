content_md: |
  ## Obligation BACS (Décret n°2020-887)

  ### Seuil
  - Puissance nominale utile (Pn) de chauffage OU de refroidissement > 290 kW

  ### Deadline
  - 1er janvier 2025

  ### Systèmes concernés
  - Systèmes d'automatisation et de contrôle des bâtiments (BACS) = GTB
  - Classes d'efficacité : B ou A (selon norme NF EN ISO 52120-1)

  ### Exemptions
  - Bâtiments avec TRI (temps de retour sur investissement) > 10 ans
  - Nécessite une étude technique préalable

  ### Sanctions
  - Amende jusqu'à 1 500 EUR par personne physique, 7 500 EUR par personne morale (par bâtiment non conforme)

  ### Contrôles
  - Inspection obligatoire tous les 5 ans après installation

logic:
  when:
    all:
      - field: "hvac_kw"
        op: ">="
        value: 290
  then:
    outputs:
      - type: "obligation"
        label: "Installer une GTB (classe B ou A)"
        deadline: "2025-01-01"
        severity: "critical"
        details: "Décret n°2020-887 du 20 juillet 2020"

