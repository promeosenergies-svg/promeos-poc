content_md: |
  ## BACS — Sanctions & risques de non-conformité

  ### Cadre légal
  - Décret n°2020-887 du 20/07/2020 (fondateur, seuil 290 kW)
  - Décret n°2023-259 du 07/04/2023 (seuil 70 kW, inspections obligatoires)
  - Décret n°2025-1343 du 26/12/2025 (report 70 kW au 01/01/2030)
  - CCH articles R.175-1 à R.175-6

  ### Sanction administrative principale
  | Élément | Valeur |
  |---|---|
  | Pénalité maximum | **300 € / jour** de retard de mise en conformité |
  | Cumul multi-sites | **Oui** — pénalité par site non-conforme |
  | Déclencheur | Audit / inspection révélant la non-conformité |
  | Délai de mise en conformité | Négociable avec l'autorité de contrôle |

  ### Charge de la preuve
  La preuve de conformité incombe au **propriétaire / assujetti** (article R.175-4
  CCH). Le défaut de production des éléments justificatifs (attestation
  d'installation, rapport d'inspection quinquennal, étude TRI d'exemption)
  équivaut à une non-conformité.

  ### Cas d'exemption fragilisés
  L'exemption pour TRI > 10 ans est subordonnée à une **étude justificative
  spécialisée**. Une exemption appuyée sur des gains-types par défaut (15 %)
  alors que le gain réel observé est inférieur (ex : 8 %) expose le site à une
  requalification en non-conforme si un audit le détecte (TRI réel > 10 ans
  remis en question).

  ### Surface de risque opérationnel
  - Audit OPERAT / contrôle inspecteur révèle l'absence de BACS sur un site
    > seuil → classification immédiate non-conforme.
  - Délai dépassé > 3 mois post-deadline (01/01/2025 pour > 290 kW ; 01/01/2030
    pour > 70 kW post-report) → pénalité administrative effective.
  - Système BACS installé mais sans rapport d'inspection quinquennal après 5 ans
    de service → non-conformité administrative.

  ### Articulation avec OPERAT
  Une non-conformité BACS ne déclenche pas directement de sanction OPERAT, mais
  fragilise les justifications de modulation d'objectif (les gains d'efficacité
  attendus reposent souvent sur la mise en place du BACS).

