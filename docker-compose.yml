# PROMEOS - Docker Compose (dev / CI)
# Usage: docker-compose up --build
# Requires: .env file with required env vars (see .env.example)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/promeos.db}
      - PROMEOS_DEMO_MODE=${PROMEOS_DEMO_MODE:-true}
      - DEMO_MODE=${DEMO_MODE:-true}
      # AI
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-claude-sonnet-4-5-20250929}
      # Enedis DataConnect OAuth2
      - ENEDIS_CLIENT_ID=${ENEDIS_CLIENT_ID:-}
      - ENEDIS_CLIENT_SECRET=${ENEDIS_CLIENT_SECRET:-}
      - ENEDIS_FLUX_DIR=${ENEDIS_FLUX_DIR:-}
      # GRDF ADICT OAuth2
      - GRDF_CLIENT_ID=${GRDF_CLIENT_ID:-}
      - GRDF_CLIENT_SECRET=${GRDF_CLIENT_SECRET:-}
      # JWT / Auth
      - PROMEOS_JWT_SECRET=${PROMEOS_JWT_SECRET:-change-me-in-production}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      # External APIs
      - METEOFRANCE_API_KEY=${METEOFRANCE_API_KEY:-}
      - ENTSOE_API_KEY=${ENTSOE_API_KEY:-}
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.demo
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
