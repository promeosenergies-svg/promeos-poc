name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Build (Vite)
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm test

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (Ruff)
        run: ruff check . --config pyproject.toml

      - name: Format check (Ruff)
        run: ruff format --check . --config pyproject.toml

      - name: Typecheck (Mypy)
        run: python -m mypy . --config-file pyproject.toml

      - name: Unit tests (Pytest)
        run: python -m pytest tests/ -x -q

  # ── E2E ─────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: python main.py &
        env:
          DATABASE_URL: sqlite:///./data/promeos_demo.db

      - name: Start frontend
        working-directory: frontend
        run: npm run dev &

      - name: Wait for servers
        run: npx wait-on http://127.0.0.1:8001/api/health http://127.0.0.1:5173 --timeout 30000

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
