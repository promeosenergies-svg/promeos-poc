name: Pre-commit Hooks Phase 7.6

# Phase 7.6 Sprint C-7 — ADR-016 Pilier 5 doctrinal pre-commit systémique CI.
# Empêche récidive angles morts Phase C audit transversal Phase 5.7 :
#   - anti-DROP Alembic (~270+ drop autogenerate retirés cumul Phase C)
#   - anti-PRAGMA-OFF SQLite (Phase 5.6 F1)
#   - anti-erreur-arithmétique formules YAML/ADR (Phase 5.6 F3 ×1000 erreur)

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  precommit:
    name: Pre-commit hooks (3 systémiques ADR-016)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit>=3.6.0

      - name: Run pre-commit hooks (all files)
        run: pre-commit run --all-files --show-diff-on-failure
