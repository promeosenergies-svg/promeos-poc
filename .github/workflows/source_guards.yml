name: Source Guards

on:
  pull_request:
  push:
    branches: [main]

jobs:
  source-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        # P0-D hygiène 2026-05-23 — remplacement de l'install case-by-case
        # (pytest pyyaml numpy + sqlalchemy + fastapi + dotenv + bcrypt + ...)
        # par requirements.txt complet. Raisons :
        # 1. Les source-guards importent transitivement les services backend
        #    qui pullent des deps en cascade (sqlalchemy → fastapi → bcrypt → ...).
        # 2. L'approche cas-par-cas créait un whack-a-mole sans fin
        #    (chaque ajout révélait une nouvelle dep manquante).
        # 3. requirements.txt est la SoT de l'environnement runtime, source-guards
        #    doivent tourner dans le même contexte que les tests classiques.
        # Coût CI : ~30s en plus pour l'install (acceptable pour fiabilité).
        run: |
          pip install pytest
          pip install -r backend/requirements.txt

      - name: Run source-guards pytest suite
        # P0-D hygiène 2026-05-23 — pytest doit tourner depuis `backend/` :
        # certains source-guards lisent des fichiers de config via chemin
        # relatif (ex: `regops/config/regs.yaml`) qui suppose le cwd backend/.
        # Aligne sur le pattern local `cd backend && pytest tests/...`.
        working-directory: backend
        run: pytest tests/source_guards/ -v --tb=short

      - name: Verify agent definitions count (== 11)
        run: |
          count=$(ls .claude/agents/*.md | wc -l)
          test "$count" -eq 11 || (echo "Expected 11 agents, got $count"; exit 1)

      - name: Verify Phase 3A skills present
        run: |
          for skill in emission_factors regops_constants regulatory_calendar helios_architecture; do
            test -f ".claude/skills/$skill/SKILL.md" || (echo "Missing skill: $skill"; exit 1)
          done

      - name: Hooks scripts executable check
        run: |
          for h in tools/hooks/*.py; do
            test -x "$h" || (echo "Not executable: $h"; exit 1)
          done

      - name: CLAUDE.md routing + size
        run: |
          test -f CLAUDE.md
          lines=$(wc -l < CLAUDE.md)
          test "$lines" -le 120 || (echo "CLAUDE.md > 120L ($lines)"; exit 1)
