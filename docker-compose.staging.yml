# PROMEOS — docker-compose override STAGING
# M2-6.A.1 (PROMEOS-SEC-2026-001) — DEMO_MODE deploy hardening
#
# Usage : docker-compose -f docker-compose.yml -f docker-compose.staging.yml up
#
# Garde-fou cardinal : ce fichier FORCE PROMEOS_DEMO_MODE=false + DEMO_MODE=false
# strict. Sans cette protection, l'endpoint POST /api/auth/demo-login expose un
# JWT HELIOS valide à tout attaquant non authentifié (token harvesting CWE-307,
# malgré rate-limit M2-5.9.bis). Voir docs/deploy/RUNBOOK_DEPLOY.md Gate 1.
#
# Vérification : `./scripts/smoke_demo_mode_off.sh <STAGING_URL>` doit exit 0.

services:
  backend:
    environment:
      # 🔒 SÉCU STRICT — backdoor demo-login interdit (PROMEOS-SEC-2026-001).
      # Les DEUX variables sont forcées (legacy + canonique) pour défense en profondeur.
      PROMEOS_DEMO_MODE: "false"
      DEMO_MODE: "false"
      # Auth obligatoire en staging (cf. backend/.env.example table comportement).
      PROMEOS_AUTH_ENABLED: "true"
